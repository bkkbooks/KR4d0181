  text: 欽定四庫全書集部四
  hash: sha256:feea65c2c5f7b24c3923896ddfefeaca5f2adb12a64602844adb735e91a1782a
  markers:
  - {type: page-break, offset: 0, content: '', id: KR4d0181_WYG_000-1a, image: WYG1135/WYG1135-0577a.png}
body:
  text: 提要嵩庵集六卷别集類三宋臣等謹案嵩庵集六卷宋李處權撰處權宋史無傳其集諸家亦不著録惟方回瀛奎律髓內録所作送二十兄還鎮江詩一首而注其後云處權字巽伯洛陽人邯鄲公淑之後有嵩庵集宣和間與陳叔易朱希真以詩名南渡後嘗領三衢云云其履貫略可考證而亦不言其距李淑為幾世今其集傳本已絶獨永樂大典中有之且尋檢各韻處權自序及其從弟處全原序邵驥原跋一一具在所紀生平踪跡差為詳備惟世系仍未明晰今案建康志有李處全小傳稱處全淑之曾孫本豐縣人後遷溧陽官至朝請大夫而王明清揮麈餘話亦稱大理少卿李傳正為淑孫即處全之父據此則處權實淑曾孫而家于溧陽瀛奎律髓所稱洛陽當是刻本傳訛以溧為洛耳淑家富典籍其邯鄲圖書志朝公武每引以為據又精研聲律所作詩苑類格今尚散見諸書中處權承其世學更能標新領異别出以清雋之思于詩道頗為深造處全序稱其齒益髙心益苦句法益老與少作不類是其覃思吟詠老而愈工雖原帙散佚東京與南渡以後所作互相糅雜不復能以年歲辨析而綜其大概五言清脫瀏亮略似張耒七言爽健伉浪可擬陳與義在當時實一作手久經湮沒幸而復存亦論宋詩者所宜甄録也謹採掇排比以體區别釐為六卷仍以原序跋分繫前後俾將來有以考見焉乾隆四十六年六月恭校上總纂官臣紀昀臣陸錫熊臣孫士毅總校官臣陸費墀原序少陵句法出審言豫章句法出亞夫有唐若我宋詩人莫可居二老先蓋其祖考源流所從來逺世父萊陽府君少承家學尤刻苦於詩建中靖國間送張藝叟帥中山三十韻有孝治追羊棗嘉言問凍梨之句浮休撫几嗟賞以為發語渾厚託意微婉可為後學模範自是名重京洛為郎拜州汩汩舊轍晚節益不偶至於廢放流離度隴蜀入涪萬逮還故官北歸下瞿塘灔澦泛大江泝淮汴多厯竒嶮益昌其詩嵩庵兄世父仲子也人物髙秀山立玉舉世父愛之早付以衣鉢在政宣時與陳叔易朱希真皆以詩名中更兵火奔迸遇物托興亦未嘗一日廢紹興甲子而後齒益髙家益貧用心益苦句法益老始與少作不類然暮年頗艱出故不多見噫詩果能窮人抑窮而後工耶審如是則詩固人所忌也紹興己巳余與兄合并於武林者逾月將行飲餞浙江上臨分哽愴不忍别且道家世斯文之屬後六年兄歿於荆州蓋不獲冉見矣諸子流落湖外遺編斷藁多為喜吟詠者持去心常慊焉陳君安民惠伯調官中都因過余溧陽暇日語長沙佳士有劉氏伯仲廬陵人自其先世喜與賢士大夫逰兄建炎末避地客其家其調護甚至舊所藏詩文頗多或者久假而不歸每恨不獲鋟版與吾人共之因裒輯少日所記與十數年來托拾得之於親舊間者四百餘篇寄惠伯使歸諸劉氏以滿其好事樂善之意兄嘗自叙作詩本末獨幸偶存較之今所亡則甚夥而先後亦失次矣異時復有得焉當為别集處全行年五十而學益落雖嘔出肺肝望古人地位終不能到一燈弗焰愧負識别慨然雪涕書所欲言不文其辭也淳熙六年嵗在己亥八月望日弟處全謹題自序處權未冠始學詩於先君一日謂處權曰三百篇詩之祖也六義存焉至六月序篇卒之以小雅盡廢則四夷交侵中國微矣詩之道豈小補哉小子識之處權再拜服膺而退既冠歸洛則又學詩於鄉先生段處厚約亦一日謂處權曰昌黎公作薦士詩序詩之髙下得失至矣盡矣不可以加矣學者當於此求外此非吾所知也處權敬佩書紳于今不忘處權固陋既不敢墜先君之訓又不敢負段丈之教雖羇旅鞍馬疾病呻吟拳拳之思終在是也昔人所謂目瞑知深搜吻動覺苦思與夫鈎章棘句月鍛季鍊者自謂有焉五十年間作古賦五古詩三百律詩一千二百雜文二百長短句一百平生之力盡於此矣不自知其不可也異時陽翟陳叔易恬嘗語孫正夫端曰恬歸自岷峩行六千里復見中州知舊其氣不衰文益進者李巽伯而已汪內相藻彥章程紫微俱致道皆極力推稱口之不置故一時名流勝士翕然相與衢守張巨山嵲嘗遺處權書云近朱希真報巽伯寄示夢歸古賦文采不減兩漢字畫逺追晉宋當今第一流也公有此客顧不佳哉處權繇是稍得自信而其志益確不知老之已至身世皆寓於其中而未始語人亦難與世俗道也暇日拾掇次第粗成編綴名之曰嵩庵集後日有能敦義愛半夜走緘書俾作者序而傳之耶或謂𤣥尚白用覆醬瓿耶則不敢知也紹興二十有四年嵗在癸酉二月旦日嵩庵惰夫李處權序
