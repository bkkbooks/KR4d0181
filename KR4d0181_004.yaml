body:
  text: 嵩庵集卷四宋李處權撰五言律詩西亭江南形勝地列坐肆遐觀氣象天圍大溪山眼界寬逺風來緑野返照上朱欄更待秋澄徹重尋落帽歡簡彥沖兄弟過午時雲簇膏春暝雨篩石苔先受色桃葉復含滋客舍居難穩家書到每遲二公俱強飯宗社要扶持簡江二十丈旅泊桐廬郡溪山過所傳稍寬遊子恨知有丈人賢水落魚蝦聚林踈橘柚懸淹留拚宿醉卧扣月中船戲簡秦處度淮海秦夫子相逢又十年好詩無漫與愛酒不虛傳夜寺雲連榻秋江月滿船不知嵇叔夜何得絶交篇簡知章野老元同社柴門不上關喜君捐俗事令我破愁顔宿雨生流水春雲媚逺山何當事雞黍把酒坐忘還道夫惠詩為和五首飯已抄雲子杯仍致麴生青梅方弄色黃鳥已無聲世態窮尤見吾心老更明從來文字飲意不在傾城獨醒非我事多難亦吾生將相知無種文章怕有聲且當乘款段無復謁承明使我忘羇旅絃歌近武城山雲談次改溪水坐來生白鳥飢逾靜蒼蠅飽不聲令君真子産墨客陋彌明回首人間世塵埃望赤城不恨青春去唯愁白髮生日長冝燕乳水滿自蛙聲念我心方逝逢君眼漸明剛腸三尺劒光彩動豐城水陸勞千里詩書誤半生山開南國翠鳥已故園聲會是豺狼靜方瞻日月明牽羊今古恨灑血望占城士特倒用韻作元日復和覔醉無千日浮家又一春間門久羅雀貧甑自生塵我欲論秦過君須賦洛神窮途依二阮遂欲老於閩再和鬢絲殊覺老淚血更傷春閲世元如夢除天總是塵有心耽傳癖無意媚錢神坐怪三衢守書來不到閩元日聞養源文少醉詩以簡之南州新嵗換北客長年悲吾日且三省我生仍百罹谷深雲不起樹暖蝶先知聞道山翁醉何如卧雪池同二三子步溪上已恨春風過猶欣夏日長鶯喧桑已椹燕乳麥初芒白髮悲如許青鞋樂未央歸來安客舍更有北窗涼謝翁養源惠醋已著蓮花釀仍兼竹葉醅橙和致上味蚋聚見良材政想攢眉漉須煩掩鼻開先生元自立不是乞鄰來見懷飄零吾老矣詩酒得斯人邂逅干戈際殷勤骨肉親錦囊元絶俗瓊樹舊無塵歸棹荷花裏從誰問玉津陪諸友野步北客身將老東風又歲華山晴添氣象水暖莫津涯貧覺他鄉苦慵嫌去路斜升平吾會見時事不須嗟淹留傷老眼放曠適間心石淺出佳色鳥幽傳好音課詩空自切饋酒莫辭深更説溪西寺明朝款款尋偶坐西齋陪介卿賞卿嘉話久之成詩靜聞簷際雨密障坐隅風竹晚葉時墮梅踈香欲空芝蘭室自好文字飲誰同它日功名事應從筆硯中夜雪偶書歲晚山雲合窗鳴霰雪飛方欣樽有酒未嘆篋無衣谷杳青松健林空緑萼肥月明溪上醉應是夜深歸淡軒野鶴元同性晴山正滿門那知有城市初不異丘樊水靜嫌風撓花開畏蝶喧應當如是觀客至亦忘言題嚴公祠挂席上桐廬溪山似畫圖斯人不復見吾道一何孤誰入非熊夢真成失馬徒清風端未泯猶可激貪夫守歲用少陵阿戎家韻寄懷蕭國器節物賴鄰家南風競剪花門無迎客犬地有噪人鴉病眼愁中暗題詩醉裏斜亂離俱老大今夕意何涯新歲偶書呈諸友已見王正月陳人百不知紅顔豈長好白髮已多時臘雪微霑土春風小動帷丘之禱久矣何意問祥祺東亭簷屋排空濶薰風眺晚晴間雲連樹碧白鳥破煙明世亂思君子身危仗友生秪應今夜月解識故鄉情桃花照水桃花樹春風灼灼開雖非天上種何異觀中栽帝子吹笙罷漁人信棹回故園何處是目盡望鄉臺挽許主簿攘攘誰逃死黃泉不獨君一官書載考五舉擅多文異日遼東鶴當年冀北羣承家知有子翮就看摩雲長橋徙倚長橋上時難得此遊水光迎目動帆影上天浮不見鴟夷子須煩顧虎頭今年閏八月好好醉中秋和彥沖同原仲過交溪橋頭不識交溪路詩來錦繡重間雲時出岫落日更明松叔夜常為鍛淵明亦近農喜君機事息魚鳥故相容和劉逸老題羅漢壁間韻僧房元寂寂客意遂陶陶詩筆翻雲錦茶甌捲露濤鴉歸寒日下雪盡逺峯髙尚喜王喬近吹笙坐碧桃再和已著詩招隱何須酒引陶胸中有涇渭筆下足波濤世亂閉門早身間倚枕髙何慙少陵老鸚鵡啄金桃題月山寺壁三首故國三千里行藏豈問天雪峯明的的水溜響涓涓指凍無完甲琴寒有折絃老僧如木石性靜不須禪罷雪仍回雨僧房物物宜溪明霜落後山淨月來時泯默窮愁志艱難食菜時弟兄千里隔書斷鬢成絲不遇彭夫子何因到此間無窮霜後木不斷雨中山秖恐髙僧占多慙倦鳥還孤雲在寥廓容望不容攀題隱居淡泊幽人趣蕭條隱者居踈簾隔花竹淨几展圖書自向交遊密何拘禮法踈為言陶靖節吾亦愛吾廬贈彥先此地堪營屋何山更採薇怪松拏石出好鳥傍人飛衰相年來見幽尋亂後稀郎君似氷玉令我亦忘歸偶書譏武團練干祿謀何拙求人計又踈祝鮀焉用佞寧武豈真愚自乏千箱積誰令萬卷餘艾肥蘭蕙瘦飢饉竟何如橋院淹留歲云暮旅泊似幽棲鷗鷺如相識牛羊自不迷已煩陶令顧何必謝公携始覺吳儂健天寒更涉溪題蘭陵稅官清輝亭不謂人間世官居有此清山橫猶倒影鳥過忽遺聲倦客方耽句髙人不治名夜寒雲去盡對面月華生阻雨小雨妨幽事徜徉所得多前期操野艇亭午出煙蘿選勝才如許偷間肯重過自憐詩酒涸無句敵陰何才臣設席彥修來過仍陪表臣終日之樂豈易得也因賦顧我非仙李知君實老彭承家羅玉樹潤屋起金贏世路嗟多事人生戒不情歲華將暮矣切勿訴深觥彥修席上命賦何處難忘酒何處難忘酒南州盜賊多黃巾方裂眥白日敢持戈不見韓擒虎寧聞馬伏波此時無一盞其奈客愁何草飲招表臣才臣彥文道夫愧匪屠門嚼且無金屈巵人生難得醉我輩不須辭山迥雲生谷林空鳥並枝前溪天欲雪為報戴逵知清明日席上呈諸友佳節年年好新春處處宜鶯花從自得蒲柳頓先衰事過如驚夢愁來劇亂絲神仙端可學吾願問安期飄零何足怪喪亂故應宜炙手寧為盛張羅未必衰篇章懷杜牧遊説鄙袁絲鐘鼎山林事胸中自有期弔彥深已秀不成實長懷事可吁寧論日下鶴遽失掌中珠擾擾遭斯厄冥冥喪厥軀髙堂親白髮淚眼尚青枯水閣雨中南國寒多雨溪山晝更晴風帆隨鳥上樵徑入雲行已苦無饘粥猶欣見耦耕故園歸未得豺虎正縱橫陪諸友赴城南妙智上人晚集晚煙林際泊夕陽波上明天寒少佳色樹老無柔聲支郎頗好事我輩適同行劇論不知醉感時空復情同士特似表過中峯餞似宗舊好崔亭伯新交阮仲容招擕來白水祖餞過中峯谷暖芊芊樹雲深杳杳鐘兵戈一分袂惆悵幾時逢食鱠設網機關密磨刀意氣粗令人思洛鯉愧客問江鱸豆麴偏相與橙虀未可無相從頻莫厭乘興不煩呼呈似表聞説煙塵近驚奔道路長人生何草草天意竟茫茫山鳥寒亡路溪花濕更香飄零值君子老眼慰悲涼發永豐道中雲斷山如拭秋明水劇虛濕煙蒙翠竹瞑雨濯紅蕖茅舍真淳俗瓷罌窈窕沽何須訪摩詰便是輞川圖喜聞三十弟消息喜得真消息仍安嶺表居深知道路逺不在信音踈荔子應憐汝檳榔敢笑渠一年看又盡兄弟意何如武林偶作江山天下勝北客興悠哉月上千峯雪潮生萬壑雷酒狂憐老大吟苦覺衰頽始滿平生願征帆未憶開寄朱希真故人俱白髮念子始青袍僕色新生敬詩名舊仰髙天寒西日瘦嵗晚北風號望望滕王閣何時共濁醪簡葉丞傾蓋鄱陽彥孤芳且寄林一官方似水五字可兼金與世不求合開筵猶見尋何當鑄農器歸望故人岑表臣檢校東臯雨中有懷詩以促歸旅泊愁春雨春寒更北風雲山方秀發煙樹却冥濛念我携家客逢君足榖翁胡為在窮谷正渴一尊同五言長律留別范元長二十八韻博洽人為史循良吏得師謀謨當啓沃出處繫安危鶚立通丹地龍章近赤墀咨詢唐典故筆削漢官儀結客多青眼承家最白眉浩然無害氣汪若有容陂慎獨仍三省操危任百罹誰嘲玄尚白自信涅非緇俯仰俱無怍幽明兩不欺愛君心匪石憂國鬢成絲劵外真毫末樊中足坦夷閉門因拂袖展卷代支頥逺覽迷千古高懷自一時海非蠡可測豹豈管能窺能事推天祿威名到月支孔融徴已晚安石起何遲不待南飛鴈貪懸左顧龜向來鸚鵡賦此去鳯凰池揭揭英靈氣巍巍柱石姿衮衣須我補霖雨更誰為賤子端何者先生頗識之幾年當顧盼今日倒爐錘解榻徐生入彈冠貢子知青蠅休點汚白璧漫瑕疵鍊句終乖律看書正闕疑地偏如有避交淡欲無私瘦馬終千里寒灰待一吹西江如可激畢命守軒帷次陳叔易太湖二十韻北客何來此浮生直偶然風飈從禹穴日腳近虞淵漁唱誰能問鷗盟我不捐燃犀怪可覩擊樹訊空傳釣石溫徐坐檣竿穩近聯波明疑練妥山淨學眉連客上三千履軍呼十萬鋋可思江栁下秖欠舞衣前鼓柂知無及乘查悵未緣逺中微隱樹闊外莽橫天縹眇湘靈瑟夷猶范蠡船健帆風作馭駭浪雪盈顛行鷺紛羣起孤鴻杳獨鶱斷崖方怒吸淺瀨或勞牽夜泊星辰逼晴占日月偏幽姿閟蛟室神物護龍泉世亂甘淪隱塗窮枉乞憐渚花迎日笑岸草信人沿頗欲追雙槳無因共兩舷時來如謝朓三復有餘妍大人生日天欲斯文起時將此道隆昭明應熊夢爽拔降神嵩業則真王佐猷當沃帝聰尊經獨韋氏識字必揚雄制作超前輩篇章萃古風不憂時易失却怕俗多聾日月胸襟裏江湖度量中讒深遭璧玷施博儘金空指日風雲會來時雨露蒙經綸觀世業潤色付宗工炯炯丹心壯氲氲浩氣充檜壇休跨鹿丹鼎且蟠龍載誕佳辰及高門喜氣融捧觴欣有祝陳頌愧無功舞鶴窺筵淨偷桃照座紅孔庭詩禮集請訪吸川虹失題天上石麟墮人間瓊樹芳叔孫知典禮曹植有文章桃李蹊方盛芝蘭室更香榻先徐孺下書異鄴侯藏載世推能事當年亦寵光頗懷追潤色奚惜吐琳琅末俗元多忌沖懷竟兩忘由來髙士駕不肯少年場鼎鼎文方古魚魚道必昌仲山終補衮虞舜正埀裳賤子虛蒙顧仁風實奉揚彈冠從入仕執戟且為郎欲作蟬遺蛻差同鼠耗倉窮途遭白眼永夜付黃粱尚齒三千客容窺數仞墻受知心有激欲報意何長皓鶴冝風露青松飽雪霜傾身挹東海再拜酌公觴謁翁丈四十韻之子儒林傑斯文國士稱詞章曹植擅典故叔孫能秉哲中逾曠撝謙外匪矜世家非冠玉人物是壺氷海內休方駕朝端且服膺五車俱可復萬頃不勞澄活國嘉猷告匡君重任勝側聞金作礪意在木從繩昔旅西雍鷺方觀南海鵬青冥翻蹭蹬凌厲失飛騰制禮初煩訂為郎頃見徴禰生宜獨薦文子要同升浪有羶供餌虛傳被襆綾可嗟懷白璧竟與汚青蠅直作悠悠去從他衮衮登時情尚馳突吾道豈慿陵善舞須長袖良醫必折肱寧為棲枳鳯不作下韝鷹鄭谷成真隱蕭齋占上層華胥久無夢款段適堪乘種柳追彭澤栽桃學武陵池涼蛙閣閣徑暖羽􅖇􅖇得句長鬚送敲門稚子應掃庭延墨客過寺折談僧賤子孤懷切窮途百慮蒸待沽希善賈投分得良朋戎馬來何速烽煙見未曽神傷瞻雉尾愁絶望觚稜漠漠雖難問蒼蒼尚可憑人心無右袒天意有中興厭世思蟬蛻傷時泣土崩漁樵甘混雜貧病苦因仍更短猶為簿從聾也作丞依仁劇山仰飽德正川增舊事將誰語前非秖自懲緣危時過棧扶老漸携藤篤義幾虛辱溫顔豈謬承醇醲須手漉撥刺賴觀罾笑語朝曛隔塵埃肺腑凝尚期文字飲相對夜深燈
