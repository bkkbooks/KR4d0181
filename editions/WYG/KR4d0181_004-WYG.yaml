body:
  text: 崧庵集巻四宋李處權撰五言律詩西亭江南形勝地列坐肆遐觀氣象天圍大溪山眼界寛逺風來緑野返照上朱欄更待秋澄澈重尋落帽歡簡彦冲兄弟過午時雲簇膏春暝雨簁石苔先受色桃葉復含滋客舍居難穏家書到毎遲二公俱强飯宗社要扶持簡江二十丈旅泊桐廬郡溪山過所傳稍寛遊子恨知有丈人賢水落魚鰕聚林踈橘柚懸淹㽞拚宿醉卧扣月中船戱簡秦處度淮海秦夫子相逢又十年好詩無漫與愛酒不虚傳夜寺雲連榻秋江月滿舩不知嵇叔夜何得絶交篇簡知章野老元同社柴門不上關喜君捐俗事令我破愁顔宿雨生流水春雲媚逺山何當事鷄黍把酒坐忘還道夫惠詩為和五首飯已抄雲子盃仍致麴生青梅方弄色黃鳥已無聲世態窮尤見吾心老更明從來文字飲意不在傾城獨醒非我事多難亦吾生將相知無種文章怕有聲且當乘款段無復謁承明使我忘羇旅絃歌近武城山雲談次改溪水坐來生白鳥飢逾靜蒼蠅飽不聲令君真子産墨客陋彌明回首人間世塵埃望赤城不恨青春去唯愁白髪生日長冝燕乳水滿自蛙聲念我心方逝逢君眼漸明剛腸三尺劒光彩動豐城水陸勞千里詩書誤半生山開南國翠鳥已故園聲㑹是豺狼靜方瞻日月明牽羊今古恨洒血望占城士特倒用韻作元日復和覔醉無千日浮家又一春閒門久羅雀貧甑自生塵我欲論秦過君須賦洛神窮途依二阮遂欲老於閩再和鬢絲殊覺老淚血更傷春閱世元如夢除天總是塵有心躭傳癖無意媚錢神坐怪三衢守書来不到閩元日聞養源文少醉詩以簡之南州新嵗換北客長年悲吾日且三省我生仍百罹谷深雲不起樹暖蝶先知聞道山翁醉何如卧雪池同二三子歩溪上已恨春風過猶欣夏日長鶯喧桑已葚燕乳麥初芒白髪悲如許青鞋樂未央歸来安客舍更有北牕涼謝翁養源惠醋已著蓮花釀仍兼竹葉醅橙和致上味蚋聚見良材政想攅眉漉須煩掩鼻開先生元自立不是乞鄰来見懐飄零吾老矣詩酒得斯人邂逅干戈際慇懃骨肉親錦囊元絶俗瓊樹舊無塵歸棹荷花裏従誰問玉津陪諸友野歩北客身將老東風又歳華山晴添氣象水暖莫津涯貧覺他鄉苦慵嫌去路斜昇平吾㑹見時事不須嗟淹留傷老眼放曠適閒心石淺出佳色鳥幽傳好音課詩空自切饋酒莫辭深更説溪西寺明朝款款尋偶坐西齋陪介卿賞卿嘉話久之成詩靜聞簷際雨宻障坐隅風竹晩葉時墮梅踈香欲空芝蘭室自好文字飲誰同它日功名事應從筆硯中夜雪偶書歳晩山雲合窓鳴霰雪飛方欣樽有酒未嘆篋無衣谷杳青松健林空緑萼肥月明溪上醉應是夜深歸澹軒野鶴元同性晴山正滿門那知有城市初不異丘樊水靜嫌風撓花開畏蝶喧應當如是觀客至亦忘言題嚴公祠掛席上桐廬溪山似畫圖斯人不復見吾道一何孤誰入非熊夢真成失馬徒清風端未冺猶可激貪夫守歳用少陵阿戎家韻寄懐蕭國器節物賴鄰家南風競剪花門無迎客犬地有噪人鴉病眼愁中暗題詩醉裏斜亂離俱老大今夕意何涯新歳偶書呈諸友已見王正月陳人百不知紅顔豈長好白髪已多時臘雪㣲霑土春風小動帷丘之禱久矣何意問祥祺東亭簷屋排空濶薫風眺晚晴閒雲連樹碧白鳥破烟明世亂思君子身危仗友生秪應今夜月解識故鄕情桃花照水桃花樹春風灼灼開雖非天上種何異觀中栽帝子吹笙罷漁人信棹迴故園何處是目盡望鄉臺挽許主簿攘攘誰逃死黄泉不獨君一官書載考五舉擅多文異日遼東鶴當年冀北羣承家知有子翮就㸔摩雲長橋徙倚長橋上時難得此遊水光迎目動㠶影上天浮不見鴟夷子須煩顧虎頭今年閏八月好好醉中秋和彦冲同原仲過交溪橋頭不識交溪路詩來錦繡重閒雲時出岫落日更明松叔夜常為鍛淵明亦近農喜君機事息魚鳥故相容和劉逸老題羅漢壁間韻僧房元寂寂客意遂陶陶詩筆翻雲錦茶甌捲露濤鴉歸寒日下雪盡逺峯髙尚喜王喬近吹笙坐碧桃再和已着詩招隠何須酒引陶胷中有涇渭筆下足波濤世亂閉門早身閒倚枕髙何慙少陵老鸚鵡啄金桃題月山寺壁三首故國三千里行蔵豈問天雪峯明的的水溜響涓涓指凍無完甲琴寒有折絃老僧如木石性靜不須禪罷雪仍廻雨僧房物物宜谿明霜落後山淨月來時泯黙窮愁志艱難食菜時弟兄千里隔書斷鬢成絲不遇彭夫子何因到此間無窮霜後木不斷雨中山秖恐髙僧占多慙倦鳥還孤雲在寥廓容望不容攀題隠居淡泊幽人趣蕭條隠者居踈簾隔花竹凈几展圖書自向交游宻何拘禮法踈為言陶靖節吾亦愛吾廬贈彦先此地堪營屋何山更採薇怪松拏石出好鳥傍人飛衰相年來見幽尋亂後稀郎君似氷玉令我亦忘歸偶書譏武團練干禄謀何拙求人計又踈祝鮀焉用佞寗武豈真愚自乏千箱積誰令萬卷餘艾肥蘭蕙瘦饑饉竟何如橋院淹留歳云暮旅泊似幽棲鷗鷺如相識牛羊自不迷已煩陶令顧何必謝公携始覺吳儂健天寒更涉溪題蘭陵税官清輝亭不謂人間世官居有此清山横猶倒影鳥過忽遺聲倦客方躭句髙人不治名夜寒雲去盡對面月華生阻雨小雨妨幽事徜徉所得多前期操野艇亭午出煙蘿選勝纔如許偷閒肯重過自憐詩酒涸無句敵陰何才臣設席彦修來過仍陪表臣終日之樂豈易得也因賦顧我非仙李知君實老彭承家羅玉樹潤屋起金贏世路嗟多事人生戒不情歳華將暮矣切勿訴深觥彦修席上命賦何處難忘酒何處難忘酒南州盗賊多黄巾方裂眥白日敢持戈不見韓擒虎寧聞馬伏波此時無一盞其奈客愁何草飲招表臣才臣彦文道夫愧匪屠門嚼且無金屈巵人生難得醉我輩不須辭山迥雲生谷林空鳥並枝前溪天欲雪為報戴逵知清明日席上呈諸友佳節年年好新春處處宜鶯花從自得蒲柳頓先衰事過如驚夢愁来劇亂絲神仙端可學吾願問安期飄零何足怪䘮亂故應宜炙手寧為盛張羅未必衰篇章懐杜牧㳺説鄙袁絲鐘鼎山林事胷中自有期弔彦深已秀不成實長懐事可吁寧論日下鶴遽失掌中珠擾擾遭斯厄冥冥䘮厥軀髙堂親白髪淚眼尚青枯水閣雨中南國寒多雨溪山晝更晴風㠶隨鳥上樵逕入雲行已苦無饘粥猶欣見耦耕故園歸未得豺虎正縱横陪諸友赴城南妙智上人晚集晩烟林際泊夕陽波上明天寒少佳色樹老無柔聲支郎頗好事我輩適同行劇論不知醉感時空復情同士特似表過中峯餞似宗舊好崔亭伯新交阮仲容招擕來白水祖餞過中峯谷暖芊芊樹雲深杳杳鐘兵戈一分袂惆悵㡬時逢食鱠設網機關宻磨刀意氣麄令人思洛鯉媿客問江鱸豆麴偏相與橙虀未可無相從頻莫厭乘興不煩呼呈似表聞説煙塵近驚奔道路長人生何草草天意竟茫茫山鳥寒亡路溪花濕更香飄零值君子老眼慰悲凉發永豐道中雲斷山如拭秋明水劇虚濕煙䝉翠竹瞑雨濯紅蕖茅舍真淳俗甆甖窈窕沽何須訪摩詰便是輞川圖喜聞三十弟消息喜得真消息仍安嶺表居深知道路逺不在信音踈荔子應憐汝㯽榔敢笑渠一年㸔又盡兄弟意何如武林偶作江山天下勝北客興悠哉月上千峯雪潮生萬壑雷酒狂憐老大吟苦覺衰頽始滿平生願征帆未憶開寄朱希真故人俱白髪念子始青袍僕色新生敬詩名舊仰髙天寒西日瘦嵗晩北風號望望滕王閣何時共濁醪簡葉丞傾盖鄱陽彦孤芳且寄林一官方似水五字可兼金與世不求合開筵猶見尋何當鑄農器歸望故人岑表臣檢校東臯雨中有懐詩以促歸旅泊愁春雨春寒更北風雲山方秀發煙樹却冥濛念我携家客逢君足榖翁胡為在窮谷正渴一尊同五言長律留別范元長二十八韻博洽人為史循良吏得師謀謨當啟沃出處繫安危鶚立通丹地龍章近赤墀咨詢唐典故筆削漢官儀結客多青眼承家㝡白眉浩然無害氣汪若有容陂慎獨仍三省操危任百罹誰嘲𤣥尚白自信涅非緇俯仰俱無怍幽明兩不欺愛君心匪石憂國鬢成絲劵外真毫末樊中足坦夷閉門因拂袖展巻代支頥逺覽迷千古高懐自一時海非蠡可測豹豈管能窺能事推天禄威名到月支孔融徴已晩安石起何遲不待南飛鴈貪懸左顧龜向來鸚鵡賦此去鳯凰池揭揭英靈氣巍巍柱石姿衮衣須我補霖雨更誰為賤子端何者先生頗識之㡬年當顧盼今日倒鑪錘解榻徐生入彈冠貢子知青蠅休㸃汚白璧漫瑕疵鍊句終乖律㸔書正闕疑地偏如有避交淡欲無私瘦馬終千里寒灰待一吹西江如可激畢命守軒帷次陳叔易太湖二十韻北客何來此浮生直偶然風飈從禹穴日脚近虞淵漁唱誰能問鷗盟我不捐燃犀怪可覩擊樹訊空傳釣石温徐坐檣竿穏近聯波明疑練妥山凈學眉連客上三千履軍呼十萬鋋可思江栁下秖欠舞衣前鼓柂知無及乘查悵未縁逺中㣲隠樹闊外莽横天縹緲湘靈瑟夷猶范蠡船健帆風作馭駭浪雪盈顛行鷺紛羣起孤鴻杳獨鶱斷崖方怒吸淺瀬或勞牽夜泊星辰逼晴占日月偏幽姿閟蛟室神物䕶龍泉世亂甘淪隠塗窮枉乞憐渚花迎日笑岸草信人沿頗欲追雙槳無因共兩舷時來如謝朓三復有餘妍大人生日天欲斯文起時將此道隆昭明應熊夢爽㧞降神崧業則真王佐猷當沃帝聰尊經獨韋氏識字必揚雄制作超前輩篇章萃古風不憂時易失却怕俗多聾日月胷襟裏江湖度量中䜛深遭璧玷施博儘金空指日風雲㑹来時雨露䝉經綸觀世業潤色付宗工炯炯丹心壯氲氲浩氣充檜壇休跨鹿丹鼎且蟠龍載誕佳辰及高門喜氣融捧觴欣有祝陳頌愧無功舞鶴窺筵淨偷桃照座紅孔庭詩禮集請訪吸川虹失題天上石麟墮人間瓊樹芳叔孫知典禮曹植有文章桃李蹊方盛芝蘭室更香榻先徐孺下書異鄴侯蔵載世推能事當年亦寵光頗懐追潤色奚惜吐琳瑯末俗元多忌冲懐竟兩忘由來髙士駕不肯少年塲鼎鼎文方古魚魚道必昌仲山終補衮虞舜正埀裳賤子虚䝉顧仁風實奉揚彈冠從入仕執㦸且為郎欲作蟬遺蜕差同鼠耗倉窮途遭白眼永夜付黄粱尚齒三千客容窺數仞墻受知心有激欲報意何長皓鶴冝風露青松飽雪霜傾身挹東海再拜酌公觴謁翁丈四十韻之子儒林傑斯文國士稱詞章曹植擅典故叔孫能秉哲中逾曠撝謙外匪矜世家非冠玉人物是壺氷海内休方駕朝端且服膺五車俱可復萬頃不勞澄活國嘉猷告匡君重任勝側聞金作礪意在木從繩昔旅西雝鷺方觀南海鵬青冥翻蹭蹬凌厲失飛騰制禮初煩訂為郎頃見徴禰生宜獨薦文子要同升浪有羶供餌虚傳被襆綾可嗟懐白璧竟與汚青蠅直作悠悠去從他衮衮登時情尚馳突吾道豈慿陵善舞須長袖良醫必折肱寧為棲枳鳯不作下韝鷹鄭谷成真隠蕭齋占上層華胥久無夢款段適堪乘種柳追彭澤栽桃學武陵池凉蛙閤閤徑暖羽􅖇􅖇得句長鬚送敲門稚子應掃庭延墨客過寺折談僧賤子孤懐切窮途百慮烝待沽希善賈投分得良朋戎馬來何速烽煙見未曽神傷瞻雉尾愁絶望觚棱漠漠雖難問蒼蒼尚可憑人心無右袒天意有中興厭世思蟬蛻傷時泣土崩漁樵甘混雜貧病苦因仍更短猶為簿從聾也作丞依仁劇山仰飽徳正川増舊事將誰語前非秖自懲縁危時過棧扶老漸携藤篤義㡬虚辱温顔豈謬承醇醲須手漉撥刺頼觀罾笑語朝曛隔塵埃肺腑凝尚期文字飲相對夜深燈
