body:
  text: 崧庵集巻六宋李處權撰七言律詩寄吕季升家世中朝第一流郡符那得久淹留詩情更入山水國醉眼獨髙煙雨樓文舉定非餘子輩元龍須向古人求磻溪莫訝功名晩今代何人有直鈎寄希真嵗晚沉沉雙鯉魚交情可是白頭疎含香不見為郎後吐屑頻聞賜對餘内廏給乗千里馬大官供餌萬錢厨絲綸潤色須公等莫負平生載腹書寄益謙青鬢追隨到白頭中間憂患兩悠悠異時果有臧倉沮他日寜無雍齒侯舊隠重過三徑菊昔賢何在五湖舟一杯坐阻論文酒老懶閉門春事休寄蕭國噐路貧不在扊扅炊調苦誰聞食菜時枉道故於尋尺見求人曷以斗升為夷吾不去齊何患叔向方來晉可知得士則興今亦古可能只直五羊皮次韻表臣見遺喜歸溪南渾似輞川居不啻當年卧草廬從昔金聲蒙醬瓿至今汗血困鹽車端知将相真無種更喜才華甚有餘及此知機同免禍季鷹初不為鱸魚自龍雲歸復次前韻野寺經旬客寓居水聲山色是吾廬喜君能道碧雲句招我更煩黄犢車世路從來多險阻人生何必問贏餘况聞一諾千金重為激西江救涸魚寄八十五姪把玩新詩病眼開家風端有謫仙才祗應魚蟹留人住肯為溪山喚我來客舍更堪秋乍入鬢毛無柰老相催重陽共醉滕王閣此觀人間亦偉哉陪德孺逰徐氏園池十載吾廬信不通偶來仁里一尊同心驚人物如江左眼淨林塘似洛中著日晶明松下雪弄波蕭瑟竹間風澆花釀酒勤料理作記東園有醉翁送粹伯弟親迎兼簡宣卿龍圖悲秋宋玉已銷魂忍聼陽闗共十分黄葉蕭蕭下寒日碧山逐逐過晴雲面如濯玉想無對氣已食牛知不羣問訊氷清懐大雅世家王謝屬斯文春晚簡德孺人生有酒即佳辰忽忽園林已暮春雨後落花渾帖砌風前飛絮欲沾人我如放浪陶彭澤公是風流賀季真伊水崧雲在何處舊衣猶有洛陽塵江上望靈石似聞環佩雜簫笙鼎立爭雄凛太清不與古今爭變化可能舒惨屬隂晴花開玉井難求種月下瑶臺但有名我亦生來未嘗屈敢持方寸並崢嶸題祖道籃輿亭淵明佳致在籃輿子以名亭德不孤異代頗能同臭味休年猶得見規模掛簷明月聊堪問入坐清風不待呼我欲典衣供一斗興來能賦百篇無雨止送王侍郎南州春老雨如絲刺眼青秧水滿陂樹濕黄鶯看更好溪渾白鷺立多時寸心折盡人千里霜鬢凋殘酒一巵我恐前身是匡鼎幸公不厭解頥詩雨後凝秀閣口占呈子方鑿石為渠水有聲四垣惟欠竹青青壁含霽月光千丈黛拂雲峯畫一屏香異定應來絶島茶甘初不藉中泠主人莫惜千金費更作飛樓擬摘星妙空出示諸公詩巻次元韻已著芭蕉喻此身木人花鳥豈知春他家定自無生滅此物何嘗有故新美玉不羞論瓦礫明珠終解照泥塵相逢一笑空歸去無語堪酬彼上人送杲兄衲子誰為蓋代豪生憎汚俗紫方袍何須鑑水能知止未必歸雲可擬髙虎穴等閒休探手龍泉取次莫吹毛君知五祖堂中老妙處何曾掛一毫簡仁山海老用山谷贈靈源老人韻禅闗無復老萊衣陟屺心摧怨夕暉泣血可憐猶不死望鄉無處欲何歸仁山老子方傳法枯木堂中久息機不見桃花并柏樹焉知四十九年非逰羅漢院途中口占休論至後日相催乗興籃輿到嶺隈風竹盡揺花玉玦雲山渾作爛銀堆須知此日逢僧話不減當年訪戴廽更喜彭君真我輩溪流渡馬肯相陪送宻老嵗寒紆錫辱西臨一笑忘言意自深怪石竒松那有價片雲孤鶴本無心上人已了洞山偈倦客方為梁父吟枯木堂中無孔笛侍郎今日是知音謂向伯恭寄曇晦二首道無南北本同流逺赴叢林非所求到底此生俱擾擾從前何事不悠悠撞鐘撃鼓千人飯戴角披毛萬刼休蚤晚相從巖下寺對床清話雨颼颼髙僧闢館坐諸生夜久亦聞弦誦聲物外喜君能筆硯塵中媿我漫簮纓鉢飱尚返慈烏哺囊句時為老鳯鳴他日籃輿蓮社約秖應惠逺識淵明喜雪剪水適從天上手綴條不作世間花柴門有客方髙枕石鼎無人共試茶清借逺山迎馬出潤含修竹倚窻斜令人却憶前年盛輦轂歡聲百萬家戊申春登平山谷林二堂時茂世應時同行追録之已過平山又谷林登髙能賦興何深羣峯雪後皆浮玉萬竹風前亦碎金尚喜日聞黄屋信可堪時動白頭吟載逰不為壺觴事擕取君家緑綺琴和懐英雪詩路迷應有誤隨車望眼樓髙莫可涯鶴駕鷺濤來浩渺瑶林瓊樹出交加廣寒玉翻羞縮上蔡蒼鷹正怒拏得句幽人方起舞夜寒明月在梨花縱賞鈎簾面逺山蟹螯誰復問尖團飛花空自嫌春晩折竹應當念嵗寒句法一如氷柱險書齋坐怪玉壺寛固知柳絮因風起何事青天亦受漫謁王夏卿同過曼卿西軒留題烟雲坐久濕人衣未覺城中有鼓鼙春到好花隨意折日長幽鳥盡情啼貴公行色心方壮曠士閒居物已齊客子不知今夕夢故鄉何處是潜溪下村水竹全類潛溪乃賛皇公平泉别墅車水挽盡溪流沮洳渾幽人晝卧懶開門諸鄰鵝鴨頓亡頼一夕魚蝦無半存及此焦枯方有禱從而暴殄豈堪論清漪緑竹城南路囬首吾廬正斷魂賦郭令南軒梅世亂何堪嵗月摧髙齋始見數枝梅想他疎影横溪過撩我清香入坐來老眼相看渾㡬許幽人獨折未多開情鍾正屬吾曹事湔祓風霜破百盃強立許酒不至因以趣之北里溪山翠滿門似聞小阮甕浮春憐渠世亂益風味念我途窮多苦辛曠士可無千日醉浮生何事百年身臨風日日香穿鼻被縛甘為甕下人雪後赴徐氏招呈德孺梅林樓閣上嵯峨淺渌浮澌亦自波荘叟夢中非一蝶右軍書次失羣鵝句從永柱思能苦人在玉壺寒更多宴寢凝香歸入夜流蘇帳小奈公何雪後赴徐氏燕集已雪猶隂更逆風斜川畧彴斷行踪瑶臺貝闕三千丈玉樹瓊林一萬重學子經時無載酒隣僧過午未鳴鐘華筵此地成賓主孔翠屏深琥珀濃醉後贈道夫氷柱雪車元有聲五言早已號長城仙源迷路及春淺盗騎解圍空月明君豈似龜将曳尾我端如鴈不能鳴何人肯作千金貸賣藥江湖隠姓名贈王師古安城西有慶雲鄉山秀溪明出孟嘗毎見朱門推愷悌遂令貧士有輝光君家太尉威名逺世譜觀文德澤長蒼狗白衣何足道古今興廢兩茫茫寒食日同賞卿歩江頭樹含新緑花事稀友生要我寜重違信脚一百五日出捫心四十九年非餳粥盤空家立壁松楸地逺涕沾衣弟兄不見音書絶植杖臨流賦式微送希真入洛一踏紅塵又五年倦㳺翻作送行篇春花秋月誰無分伊水崧雲自有縁我比嵇康猶更懶子追元亮故應賢因歸望訊忘機老買箇魚舟費㡬錢投建陽王宰異時丞相柄文盟一顧曾空冀北羣鈆槧無功方笑我箕裘不墜蚤知君詩家只説王摩詰官况誰憐鄭廣文散盡黄金猶作客還來把酒對孤雲酬辯老見遺懐舊之什老去何堪行路難氷霜㡬晚見蒼官鱸魚南國無張翰妓女東山有謝安秉燭夜闌真是夢傳盃秋際若為歡吾徒恰似豐城劔光氣須從斗下看題次真東軒亂來身世任浮沉宴豆南州㡬盍簮十頃菰蒲秋向晚一池烟雨夜來深詩成頗復蒙嘉賞酒熟時須共滿斟喚取陸郎擕緑綺小凉同聼越江吟陪德久出郊北客南征嵗欲隂經行始滿愛山心霜溪見石如清洛煙樹参雲似故林昨日喜傳黄屋信餘生怕聼白頭吟公歸問訊庵中老隻履西來意淺深謝翁士特惠筍北客未識猫頭筍此來逢君欣得之出土好色已勝玉下箸珍味端如飴口涎饞嚼笑早計食指蠕動能前知小爐誰見親煨熟醉眼瞢騰岸接籬再到值雨無復清池照病顔尚餘詩思發天慳西風似水初鳴葉細雨如塵不隔山嵗熟自然民意樂時平更覺鳥聲閒江梅㑹見花敷雪劇飲須期倒卧還偶至溪岸時當寒食書節物呈同行風作山雲斷復飄沙平竹日影蕭蕭柔桑始葉蠶爭出淺水無魚鷺獨翹白髪尋春悲去國朱門賜火望行朝㳺從此地多君子乗興來過不待招止戈堂坐見妖氛犯斗魁使君謀畧信雄哉㓂如狐草間出兵似貔貅天上來門館無私千里靜賓朋多暇百壺開他年入數中書考始識汾陽濟世才簡王夏卿侍郎下村正與輞川同只恐桃源有路通山色直侵書幌裏花香盡泛酒杯中使君已致随車雨丞相方来㧞木風照席侍郎真玉樹慨然憐我坐詩窮寄徳器二首清躭七盌愛盧全富貴千金鄙鄧通新嵗烟塵悲塞北舊時花鳥憶回中可能春雨如秋雨合是東風却北風尚喜張儀惟舌在百年從古沒終窮客舍春寒數挽衣雲重雨濕不聞鼙老妻未免負薪嘆稚子何為索飯啼南地好山青不斷故園芳草緑應齊胸中磈磊但塵土慚愧錦囊兼玉溪後樂堂去盡沙鷗水照空羣山濯玉有無中亂来更覺心情減佳處猶欣臭味同喜有清樽對雌霓慚無健筆繼雄風此行㑹見承平否嵗晚飄零已禿翁和與可見恵之詩倚馬萬言纔一揮問年於我亦肩随才華早擅鄉評在人物行看國士知黄巻沉酣端有志青雲騰踏豈無時小人薄宦猶三黜方駕聊同柳士師次韻巽老風前竹榦須料理雨後蝸涎費掃除北客經過無好語南州騷屑少安居雄稱百萬空扛鼎功蓋三分漫顧廬識字信為憂患始鄴侯何必萬籖書迓辨老琳宫尚記昔年逰撲面楊花晚不収自倚釣魚終悟主誰知射虎不封侯江湖已恨長為客風雨何須横作秋未見故人心已醉更拚十日為君留元長生辰力扶吾道與斯文世職家聲蚤出羣欲致昇平寜舍我從來出處不忘君龍吟虎嘯彌千日髓烏肝恰一斤已格皇天方俾夀未須騎鹿上青雲送蔡伸道當年傾蓋便情親老去那知更賤貧松竹故園秋未老溪山南國雨能新可憐作客身如夢尚喜傳家筆有神咫尺重陽歸務速吹花落帽要吾人題南浦樓此生何處是真歸俯仰人間念念非雨後溪山無限好煙中鷗鷺自由飛隻輪雙槳成何事白酒黄鷄可息機北客上來千萬恨故鄉囬首夕陽㣲七言長律題錢德載雙清堂誰識堂堂忠懿孫至今人物典刑存頗同陶令辭蓮社但學龎公隠鹿門醉枕泉香分石脉吟窻樹老出雲根喜携自有東山妓好事寜無北海樽服食方依煉丹井躋攀莫近洗頭盆秋風百本籬邊菊夜月三號澗下猿未怪頻穿康樂屐可須多羡辟疆園題詩我愧詞源涸作記渠能學海翻亂後煙霞真得計靜中丘壑要重論十年殺氣纒伊洛囬首吾廬正斷魂七言絶句偶書三首柴門如畫映山隈窈窕軒窻向水開想見幽人清徹骨松隂翠竹竹隂梅碧澗濺濺遶竹林欲從源水阻幽深春風想有桃花樹更有漁舟可訪尋朝雲漠漠雨絲勻山路清無一㸃塵桃李著花溪水滿斷腸何處故園深雨止奉送制置侍郎王公已晴雲氣却濛濛坐見前山沒半峯報道名卿謁丞相不須行雨借蛟龍簡辨老晚風吹葉滿溪流落日孤雲萬里秋徑欲五湖尋范蠡醉擕西子上扁舟戯辨老不獨京塵解化衣秋陽流火樹隂稀折腰為米初何有親見淵明負弩歸舟中偶書兩山相對似香山灘響渾如八節灘安得髙風從此去載醪猶是菊花殘道中題梅山家梅樹出疎籬好客慇懃折一枝直是老來風味薄而今相遇可無詩雪中過伊南低隂漠漠水漫漫楊柳如絲不忍看見説山前風更惡杏花無處避春寒促夢弼釀客舍猶尋未見書鄴侯何止萬籖餘君家釀玉推能事得及重陽把盞無題湘園當年此地勤花竹景物方成姓又移儘愛芙蓉照秋水倚風懐徃亦多時赴端禮之招道中髙人折簡苦相催要及春風把一盃花柳溪山寒食後雲中何似雨中來次懐英韻亂來身世羡沙鷗雪後溪山粲兩眸不用東床呼外舅當年雅契在仙舟陪德孺逰徐氏園池禽魚花竹靜相参溪雪融春青出藍月下醉歸休秉燭要將清夢過江南和翁子秀夜過溪橋韻千里無雲湛九霄月明花露滴春橋何時心緒如楊柳笑倚春風萬丈條
