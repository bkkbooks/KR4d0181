body:
  text: 原跋文妙物也以變故竒煙雲杳靄之有無江濤出沒之荒忽魚鳥飛潛之下上晦𡨕朝暮姿態呈豁愈變而愈無窮兹亦竒已而文之為物實與之俱爰自鴻荒以還厥裁不一畫焉而神疇焉而章筆焉而信歌詠焉而莊皆以自然之天錯綜經緯而萬物之變形焉非特不能不為之亦莫之為而為者也然則文之由來尚矣世去古逺人不克聖而物之精華不可以終祕梁臺之選吳興之粹蟬嫣舄奕代有作者燦然珠琲之溢目泠然笙簫之入耳也源𣲖雖殊終會于一至於枚别諸家銖考殿最若十指然其短長洪纎卒不可得齊豈人之有能否抑其習有工拙與建安七子時有所取李杜文章羣兒謗焉要以其全者責之故難也雖然不更三聖無以見集成之大不歷三變無以知一出於正者之為粹然我朝當五季之橫流質窮弗反承乾棟絶坤維摧陷廓清之功與文俱髙崑體雖張不能柅其駕使勿馳也於是穆伯長尹師魯歐陽永叔輩為之導流揚波而古文篇章始得助而中興列聖相承重熙纍盛先正李公淑以文章伯為時宗主髙文大册煉石五色天下謂之邯鄲家雲來礽昆世載其德不墜至嵩庵乃復以其餘力遊戲翰墨之場輩行推髙表表愈偉而其富且特出者最見於古律詩淳淡典雅一唱三嘆如融怡帝鄉日浩蕩天街春則鎬京繼代之作也相逢便論心已别更回首則伐木故舊之感也還將太古意一洗萬境寂真足以見其文之不苟作如杜子美穿花點水等句姑將置之不肯一吐其自序以三百篇為家傳之懿決非貌得之端公既標識其次而綴語編末不鄙命豫豫為述文章之妙雖選粹所集少有得其全者獨我朝之盛幾焉耳矣每歎前輩之於家學守之彌謹如羲獻書如班馬氏史如専門名家經如世將用兵行師法其率履不越蓋如此端公方以盛名頡頄斯世每一語出意外驚人是能其家者今將恢壯圖挽洪流鋪張潤色以復我祖宗之舊而挈之唐虞三代之上斯文之責實於此乎在時宋淳熙庚子東陽邵驥跋
