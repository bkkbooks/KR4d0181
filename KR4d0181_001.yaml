body:
  text: 嵩菴集卷一宋李處權撰賦樂郊賦并引春雨既霽放步於野見飛者鳴者哺於巢者遊泳於淵者戲走於陸者與夫行歌而醉於路者凡生物之遂植者蓋俯仰之間無不欣欣而樂也於是感焉豫亦忘其老之將至身世之所遭也而況不隕穫於貧賤既行乎其素矣則何往而不自得邪作樂郊賦其辭曰感餘生之幾何兮冒霜雪以盈顛邈吾廬之安在兮寄幽夢于澗瀍駛嵗月之不留兮梗行路之且邅起臨風之浩歎兮嗟欲往以無緣徒搔首以延佇兮復顧影而自憐眷於越之上游兮適寓止之所便稅豫駕于蕭寺兮占南嚮之明軒敞函丈之几席兮納萬頃之風煙屬幽人之晨興兮暢晞髮而潄泉徐拂塵而啓户兮藹春物以相鮮紛宿雲之解駮兮散朝陽於一川挺嘉木以敷隂兮嚶其鳴而始遷念人生之行樂兮宜及時而勉旃飫筍蕨于既飽兮破月團而自煎幅巾藜杖適野在田或狎鷗而藉草或觀魚而臨淵或流憩以騁望或㑹心以忘言于時逺山兮連連近水兮濺濺青秧兮芊芊白露兮娟娟麥初芒兮燕乳桑已椹兮蠶眠喜膏潤之及私兮庶遂逢於有年田父野老醉著道邉扶擕不去墮幘頽然蓋不減拾遺之杜曲右丞之輞川也豫亦興盡而返欣此地偏披襟脫帽斷簡絶編樽陶情而有酒兮琴寓意以無絃惟受性之拙疏兮乏趨時之周旋委窮達於造物兮問行藏于彼天凛嵗寒之孤操兮固久久而彌堅擬登髙之能賦兮託餘思以終篇方俯仰而自得兮尚無愧於昔賢夢歸賦并引豫洛人也既更衰亂奔竄潛伏煙塵阻絶身世相弔遑遑乎羇旅之憂忽忽乎嵗月之久也遲暮良苦一夕夢歸故里顧經於目而歷于耳者憯不勝乎其悲也作夢歸賦雖文不足采而援古知今卒反乎正庶不謬述作之旨云其辭曰夢故國之圮城兮陟曲隅之欹亭俯伊洛之蜿蜒兮仰嵩少之峥嶸痛一炬之焦土兮徹雲漢以宵赬弔瓦礫之塞路兮失厦屋之連甍蓊草木之叢灌兮駭鳥獸之悲鳴訪吾廬之無處兮慨遺址之已平動心目之惋傷兮慘神沮而骨驚究此都之宏達兮匪郡國之可配也挺龍門以䇄其面兮伏邙阜之峙其背也亘飛梁於波上兮矯雙闕於雲外也鳴天雞之一聲兮非煙擁乎冠蓋也思當年之行樂兮信承平之嘉㑹也想澗瀍之始卜兮奠九鼎而初定也宅取夫天地之中兮氣得乎隂陽之正也奉巍峩以再遷兮轉岌嶪之連乘也揭神行而百靈護兮極方怒之萬牛併也世三十而年七百兮姬公導其慶也諒輕重之在德兮胡楚子之可問也皇哉我朝兮遹德事之追前聖也偉恢復之鴻業兮眷上帝之所命也陋𤣥肅而不算兮抗宣光之與並也席成基以永固兮膺寶運之方競也觀兹鼎之復出兮奄舊宅而果盛也梅花賦豫衰病索居經嵗不出芳物過眼真成一夢偶作梅花小賦以寄所懷其辭曰伊造物之發生兮無一木之不卉顧四時之不齊兮曜白黃與丹紫懿江梅之秀出兮儼亭亭而絶比既嬋娟以映岫兮復窈窕以臨水類忘言之貞士兮肖獨潔之君子許蘭茝之僅似兮睨桃李之可鄙占嘉月與好風兮泛幽香而未已寄美人之一枝兮想橫斜于鏡裏抗翠袖於天寒兮撫修竹而孤倚悵衰翁之掩關兮抱微疴之在體起三嗅而三歎兮魂忽蕩而心欲死悼亡賦并引豫幾七十而鰥倡無和也問無應也視人世之苦無甚于茲者一日抑淚茹悲作悼亡賦雖不足以增伉儷之重庶使覽者知豫不敢于其厚者薄也其辭曰噫豫雖老而鰥兮坐成窘獨之叟眷伊人之具美兮視同列而未有追維琴瑟之義兮謂相從于白首忽一日而不見兮慘四顧而無偶始來嬪于我家兮倐五十之改嵗惟內政之克修兮躬蘋蘩于時祀施慈惠於僕妾兮靡失色于娣姒既甘苦而食淡兮實于君而有愧何沉疴之不解兮豈厄㑹之偶值楚切切而在牀兮亘日夜以相繼愀皮骨之僅存兮情惻惻而不忍視訖命盡而數絶兮奄悠然而長逝痛割裂於心膂兮隕滂沱之涕泗譬令孽婦之久生兮曷若假夫君以永世信尤物之易毁兮審竒花之早落抱雌如吳門之劍兮返魂無齊人之藥顧晨夕之傍偟兮類失侣之孤鶴攬明月之入窗兮驚風動乎簾幕淡星河之欲曉兮清露零于叢薄悄空閨之岑寂兮想音容于冥漠矧早衰之多難兮決非久于世者歎幽明之異路兮復何時而見也哀斷絃之莫續兮悵貝書之不復把懷平生之好合兮竟繾綣而難舍覬魂夢之可接兮睇長松于廣野雖涸流以濡翰兮浩豫悲之莫寫五言古詩謝士特餉櫻桃今年客閩中春山亦花鳥時果次第熟風露枝裊裊含桃品居最朱實若自表髙人肯見分厚味未覺少絳囊敢鬭荔木蜜虛名棗多食顔自駐此語聞本草翩翩出谷鶯啄取定先飽故園當此時行樹映池沼散火耀隅隈灼目看未了翳葉色逾深纍顆核更小園人挈筠籠銀甲摘清曉勻圓入雕俎擬借麻姑爪擇佳間留玩引杖日數繞煙塵坐流落魄斷首空矯贈劉至道性靜乃可琴德常乃可醫二事人所難而子能兼之好古身則潤活人功不資未愧孫思邈何慙鍾子期俗眼多重輕世態工瑕疵自視無所嫌安行復何疑子有賢舅氏聞名四方馳勉矣歸問津沛然有餘師贈彭表臣才臣我交半天下頗接金石友相逢便論心已别更回首三年厄兵火水陸東南走風餐近波浪露宿薄林藪廬陵信名邦昔賢猶見取水南遇彭子門巷似無帚胸中有涇渭如鏡不受垢呼兒具杯盤物物皆可口新青擷嘉蔬大白釃旨酒使我忘身世不復問升斗茫茫四海內二子可與久我昔當少年擺落謝紛糾老來齟齬事在十常八九尚倚筆鋒徑恃此或不朽飄零欲何歸故國生藜莠無乃造物意窮途一假手丹楓作初寒客袂不掩肘冥冥甲子雨山逺似無有試問夜歸舟網中得魚否同吕倅小飲一日不作詩已覺神不王一日不飲酒更苦舌本彊梁王自墮馬賈傅恨無狀寥寥千載後有懷意誰諒夫君出世家偉一魁三相人物方輩出事業雅相尚笑我守丘壑蹤跡更漫浪尚餘杯中物足以助豪放相逢傾五斗老子未多讓送嘉仲兄赴永康宰我兄如瓊林皎皎塵滓外不從門地初便許人物最裁詩陶謝流射䇿朝董輩咳唾落人間一一珠無纇羣居款名理澡雪賴針誨坐我琅玕林清風長十倍誰令困小官寸進而尺退前年宰滎澤與古能吏配兹入山水國牛刀欽益淬穩借一帆風開濤上鯨背獨憐藐然孤厭逐兒童隊夢想在東南浮雲寄心㑹定不俟瓜及歸奉明光對猶當念竒窮寂寞將把耒右司公致書顯上人并遺楮衾詩以贊之併簡都公緇徒中有人籍甚初與顯是非不掛口好惡不入眼終日但怡怡言行無可揀外相示枯槁風味殊不淺初公如鶴長昻藏誰得管今秋忽坐脫山立不少偃顯公方晏如隨緣自舒卷平生三事衲夏燠冬不暖大雅右司公國器乃瑚璉頗敦方外契淵明亦親逺道術久相忘書來叙繾綣一被直千金溪簾淨氷繭邀我置香茗撫玩不忍展而我在家僧業習盡鉏剗琴書不療飢拙生良可莞未識韓荆州不敏懷愧赧向來袖漫刺到門不及款音問復後時當䝉貸疏懶公如驥騰驤我類鱉跛蹇出處固不同投分悵已晚明年壑源春驅車望雲巘載醪問竒字從公定忘返溪晴獨釣霽景如發䝉幽人事臨眺山明乍開屏水淨新拭照百年能幾醉萬事付一笑綸巾稱芒屩持竿坐窈窕勿謂吾鈎直我意不在釣獨鶴何處來寒雲發清叫乃以聞天聲和此登臯嘯我亦遺世人與爾豈殊調水梔隂泉隱巖壑長夏發幽植深處但聞香往往樵蘇得幸不雜薪槱論價亦何直適從支郎舍逺致居士室婆娑復偃蹇其髙不盈尺鉛華了不御絢此氷雪質我有古魚洗嵗久莓苔蝕注之清泠水藉以璀錯石靜態自愔愔孤芳何的的初疑雲生礎復訝月過隙膏沐露穰穰動搖風激激忽然參鼻觀似欲破禪寂俗物多豐肥仙姿乃癯瘠已輸白玉英更作黃金實昌陽詎足數薝蔔誠可匹老來無所好一見心輒溺坐卧與之俱於焉遂成癖異時張紫薇飲客盡一石放懷歌舞筵折贈無所惜蟬蛻倐仙去樓居藐姑射三嗅哦公詩俯仰成今昔問花花如嚬對之長太息孝感堂孝為百行本儒訓存六經未有仁而遺禮宜權重輕哀嚴以事死敬樂以事生豈徒天性得乃見人道成顯顯三彭子德事肅且馨好仁無以尚尊譽鄉有評當年綵衣戲此日羊棗誠春秋薦霜露灑掃供粢盛新亭潔輪奐拱木連髙甍霜松無鹿犯風樹有烏鳴不慚王謝家芝蘭秀階庭他年看崛起濶步躋公卿可為風俗勸以代門閭旌埋蛇功亦微獲報猶爾榮豈念不忘本罔極通無形天人固相懸昭然無臭聲請觀妙蓮華嘉瑞非其徴次韻德孺晚菊屈原作離騷採菊飱其英淵明賦歸來徑荒菊猶榮此物有至性名因君子成豈知時節過不顧霜露凝嵗華易晼晚芳物隨凋零艷色始獨秀馨香自孤清花似時美女俗惡空娉婷由來品次定橫議那得爭公如醉翁賢雅好違世情三噢復三繞莫逆如友生泛之黃金杯願言制頽齡更呼門下士哦詩同倒傾次韻約之秋懷野人不入俗裋褐分田舍由來黃犢車不受塵中駕空牀蟋蟀邉隂牖蒲萄下適然契幽懷推枕起中夜粲粲東籬花如為時節好冥冥花上蝶婉孌死亦抱神仙那可求姑欲學不老去去人世間髙步擷瑶草偶書春事有底忙清和風已扇小雨出花竹微寒生几硯直道每多違修門難自厭棲遲無與言袖手看歸燕陪林茂南逰上清宫分韻得落字百年夢一覺無事且行樂何必尋方外而求不死藥我里足嘉處勝踐兩芒屩有來問名利掉頭告莫莫夫君永嘉彥載酒情不薄凌晨馬首北共赴雲霞約珠宇敞天中非煙動寥廓黃庭拜吾祖素髮炯然灼堂前繫牛木柯葉宛如昨少陵詩之史餘光賁伊洛雖煩鬼神護九原不可作我輒吟其傍窘􅪣愧穿鑿是時天已霜山川向搖落南登駐蹕亭北上朝元閣俯仰盡形勝觴詠得盤礴惜無羽客琴一洗塵土惡簡友生促酒閉門傾濁醪勝接俗子語蟹螯得橙韲風味正如許緬懷氷雪姿何由對談塵夫君腹為笥萬卷方撑拄哦詩送歸鴻平生無漫與十年就閒曠一日看軒翥老夫衰病餘頽然守環堵無因少年事插花更椎鼓嵗晚場圃休黃落溪上雨溪邉雙白鷺見影忽驚舉水天渺無際瞑靄下前浦此時亦愁絶擁鼻吟正苦安得百斛舟載取君家醑釣臺先生志丘壑溪山助幽興持竿聊爾爾至樂在游泳故人已龍飛旌車逺來聘掉頭藐不顧長揖辭萬乘人生各有願可不安吾分是在易之乾曰遁世無悶至今堂前竹蒼翠有餘潤我行出祠下敬謁仰勝韻愧負營口腹馳驅違本性言歸不敢遲賣劒買魚艇題無疵庵身無纍則佚心無營故樂舍外而取內此味初不薄使君蚤聞道觀妙契獨覺不即仍不離無止亦無作庵如大圓鏡萬象含虛廓簷空看雲歸窗靜聞雨落惟良二千石分憂得此託藴真愜所寓俯仰成今昨潛心齊古之學為己今之學為人始乎芒芴間擴充遂無垠克已而復禮天下皆歸仁尼父百世師道妙聖且神天將為木鐸故未喪斯文賢哉顔氏子至樂忘其貧語之而不惰好學無與倫孟子養浩然卓爾踵後塵萬鍾與千乘不肯易其身茫茫自聖哲六籍經幾秦末學更多岐學海無問津伊川二先生身修道愈振當年從之遊不減洙泗濵至今士氣盛亦復民風淳柴子柯山秀言厲即之溫由來思無邪果見德有鄰潛心坐一室淡泊遺囂紛收視而返聽自得于見聞先生雖云亡書在傳日新得味極鑽仰恍如入室親而我先君子實預絳帳賓我亦聞緒餘往往書諸紳多言反成蔽目擊道乃存藜杖一幅巾蚤晚來叩門謝王敦玉惠雙兔惟兹衣褐徒功用莫與大馳騁文字間下上無不載卓哉昌黎公毫端跨百代傳紀何新竒不泯良有賴先生胸次廣萬竅號一噫學成身益窮動輒與時背興憐不肖子磨礱去瑕纇辛勤三十年所得才稊稗遺我雖八蹄髙義意有在想當避鶻拳岡壟如歷塊束縛諒何施拙情甘自退筆硯行且焚重垂兒子戒方當事口腹坐與巨觥對閉門擁紅爐大嚼資一快送森姪赴官郴江帶郴山逶迤入平楚偉觀甲瀟湘信美非吾土阿咸方試吏家風在儀矩此時奉親輿行李慎袢暑别離同姓重況我老爾許勉力事勾稽逺臣觀所主招士特似表山雲向晚留山雨凌曉濯花明紅欲墜松淨翠可握未覺人意寬獨喜鳥聲樂平生麋鹿性避地諧丘壑復接翁季友詩文賸酬酢蘿門邃宜步窪樽深可酌不聞杖屨過無乃厭磽確願承名理談煮茗破昏濁自冝興歸謁鄒德久不遇客裏仍驚奔南走荆溪上繫船樓前樹偶接丈人行兹惟天下士抱負不可狀而今年七十面睟背益盎論文復把酒十日共清訪歸家照眸子炯炯覺神王朅來情所親鄒子頗直諒斯文有能事筆挾風雨壯今晨叩其門不見動惆悵我希嵇叔夜子慕陶元亮念子如清風執熱欲何往冦退子當返子去我曷望何時芝蘭室重見玉色釀快意傾百杯澆我舌本强行之金部既獲奉祠之請歸赴大阮之約詩以髙之阮籍頗推咸謝安已舉𤣥盛事如昨日風流想當年嶷嶷次對公人物藝且賢文忠命世豪植本濬其源世家不乏人名德見所傳郎官後來秀骨相尤卓然庭中生玉樹池下出龍泉向來宅大憂未了粥與饘吉服事朝請髙名動陶甄青雲要平步一嵗期九遷人事喜倒置正直成黨偏一笑就閒散拂衣遽言旋及門聽傳呼和氣歡相延共止一區宅分食二頃田逺從物外逰髙謝區中緣方須康樂屐豈問祖逖鞭人生規逺大跬步何足言風雨聽朝雞結束無安眠何如一丘壑耳目清不煩嘉禾䕃沼沚可濯亦可㳂有酒自獻酬醉操雲嶠篇慕此𡨕冥鴻念彼跕跕鳶賤子不適用受性愚且顓晚忝登門逰繆稱嫫母妍眷言林下期雅尚寄所便野服袖漫刺乘涼過東阡賦樊氏園雙花天地有至和薰蒸效兹祥異哉桃李蹊葩萼俱作雙紛紛承朝露一一含春陽飛來兩珍禽文采粲成章鳴集芳樹間其音美如簧近君白玉堂奉君黃金觴君家伯仲賢人物偉相望衣冠作嘉話何止跨一鄉永言棣華好和樂殊未央我賦角弓詩封植詎可忘翠微堂為劉端禮題我讀醉翁文想當筆如椽東坡獨知翁謂今為飛仙偉明後來秀文亦星斗懸一旦辭世紛歸巢月輪邉大雅久不作劉子藝且賢筆墨所橫潰折衝遂無前向來坐位書一日萬口傳不慙顔魯公易地則皆然身閒無事日日涉五畝園圗書破百金花石費萬錢子真隱谷口摩詰居輞川淵明道上醉知章井底眠風味有數子較量誰後先君乃於其間并得四子全髙堂納日月竹樹森以聨覽彼不盡景樂此無窮年前山若飛來倚斷西南天灝氣濯蒼玉晴陽生紫烟固疑融結異真恐造化偏想像山中人因之招隱篇我家居洛陽門巷伊水連吾廬䕃清竹不受車馬喧一來升君堂撫事情悁悁交淺言已深勝處相磨鐫却來從杖履已辦幾屐穿折簡王夫子載醪擕嚮泉題東坡枯木先生萬卷讀命世文之豪矯矯鸞鳳姿仰止人物髙坐石翳白拂古繭磨衲袍玉堂揮翰手不數乘與褒前身老畫師寓興時抽毫要在胸中竒醉筆隨秉操柘原沙錯錯獨樹風騷騷天荒鳥不入路絶人告勞一旦辭世紛御風歸泬寥遙知紫玉府冠佩方逰遨不然跨汗漫騎鯨弄雲濤夜中夢見之酌公以蒲萄覺來空把卷我心增鬱陶送翁子秀歸泉昔從大小阮日為林下游酒熟無孤斟詩好不易酬形影一參商書問缺置郵渴聞盛德事仰止東家丘大阮今養髙譽望老更收小阮遂長往嵗月已載周人生一世間所重惟交遊而我憂患餘身事良悠悠阿戎逺來過整整儀矩修話言極敦篤道舊何綢繆蕭寺夜寒深風雨鳴颼颼秉燭如夢寐惝恍一夕留明發又告别行色不堪憂贈言加餐飯心折涕泗流贈術士君平隱於卜百錢非少多術妙語更簡數精心匪他羣書了在口誦解如縣河馳聲日籍籍問肆肩相摩小人惡切直先生無詭阿有時隘窮巷軒冕紛巍峩朋來競徼福習吉理則那從而再三瀆不告反嘲訶少焉一閧散簾前可張羅要知安分者魯叟正波波叔父作夀藏昔聞劉伯倫荷鍤常自隨又聞陶元亮自作挽歌辭人生一大夢未了黃粱炊有初必有終此理夫何疑大阮吾宗傑德事見所施後凋難老質夀考當期頥開阡營兆域預卜青烏期無乃大蚤計究竟良不癡一旦與世辭於焉乃真歸庶幾達者觀永謝髙人嗤山川藴嘉氣雨露竹柏滋于公更髙門駟馬來不遲將至蘭陵道中以逺岫重叠出寒花散漫開為韻我如萍不根有往而無返天涯與地角孰能量近逺故鄉無巢歸流落嵗時晚辜負平生心何由見嵇阮故家洛陽隅煙林接雲岫社酒無俗期柴門有清叩傳聞俱丘墟淒涼兵火後秖應秋夜月松竹影如晝驚飇起羣鴈落日明孤松溪駛石齒齒樹斷山重重功名貴及時丈夫不可慵初不繫賢愚秖繫其所逢故人限南北昨日夢寐接朝來得素書開緘意稠叠别時贈吳鈎璀粲猶在篋因循愧遲暮欲見煌煌業王民墜塗炭志士懷憤鬱豈無卧龍人想待三顧出從容命世豪肯為庸主屈英名如白日千嵗常不歿舟子厭牽挽峻瀨凌風湍煙霏麗初日水氣生早寒鹺物直六伯始歎生理難一月不食肉悽然對盤餐客程方浩渺念此道里賖秋林傷客情霜葉色勝花溪魚不論錢我飢豈無涯何當見升平四海如一家溪行日有趣便欲老絶澗復懷少陵作亭午氣始散客子鬭身强尚得加餐飯弟兄杳何許不及沙頭鴈早希馬少游下澤而款段一官聊爾爾此志亦復漫束薪與斗米未足了晨爨人生固可憐況復更憂患小黠而大癡耄耋均童孩當其有酒時且共笑口開淵明真可人吾廬歸去來我今無吾廬念之寸心摧送范才元古云七尺軀不及一尺面紛紛閲人久過眼今乃見吾弟外門傑籍甚東周彥瀾翻倒三峽浩博橫萬卷不減王夷甫似是曹子建抱負三十年始遇相君薦聲名徹當寧賜對金鑾殿乃不留石渠頗動薦紳歎大藩須按察此事君亦漫遙知閉齊閣幽討在几案嵗月局上消山水琴中玩官池本不渾慎勿驚魚亂明年麥秋殘荔子承清宴即席灑椽筆可酢風味獻歸來佐中與密勿膺帝眷不忍話艱難江淮尚酣戰乃翁月旦評飽學冨文翰當年䝉賞音好我置華饌侑觴出歌舞色溫微笑粲回頭隔生死拊事臉必泫而今百無堪老大足憂患讀書秪自誤株愚不知變平生一丘壑競此豈其慢正可卷而懷安於素貧賤故鄉無巢歸客子鬭身健功名要晚就婚嫁須早辦浮萍偶相值悵此臨岐餞更待南鴈回書來警衰愞送張巨山士為知己用亦為知己死嘉哉孔文舉特達惟薦禰寥寥千載後此事今已矣俯仰常有懷邂逅過願始襄陽紫微公操行見所履字如入草蛇詩繼餘霞綺家聲鳳凰池盍在金門裏三年民父母政事粲可紀倦游丐閒歸解紱如脫屣東山寧久卧行為蒼生起要觀補衮功左右聖天子小人不更事豈解令公喜平生萬卷書不直一杯水頽然衰病餘所存今復幾與世竟悠悠逢人但唯唯從公文字飲德言方在耳胡為舍我去衣袖不可禠離合亦偶然世事皆如此聲出已復吞相顧淚如洗送榮茂世戎馬絶黃流飛塵暗京畿竟成王室禍痛定不忍思衣冠半陷沒逃難皆散之有如水衡君將命弗顧危躍馬赤手出扼隘河之湄中途被衝突星夜西南馳回頭望城闕􅞅隔母與妻半年無家書欲言涕先揮微身亦曷愛所憂國步隳倉黃偶不死定省陳苦辭汴水六七月橫泛被兩隄河渠忽中乾漕挽功莫施不劾輒加罪散秩總厥司相次下維揚庀職從六飛衆人之所畏逺害夫何疑春來儀真火鼠輩輕王師偉哉馬氏妹貞節不可欺終焉兵在頸視死端如歸何慙古烈婦事與日月埀君性根孝友而不求人知方其聞孽初對客神若癡茹悲不敢哭上念親老悲豈惟識者悼行路猶歔欷兹疇魏樓功叙君官甚卑幾年始見録孰為公是非君懷有直氣不為寵辱移朝來又駭聞白簡停官資索馬亟往唁我心有不怡君乃笑迎我喜色見睫眉曰此造物意巧以從其私舟楫密已辦生具亦甚微稅駕不可必茍全其庶幾我貧君不厭交契管鮑期去意尚勇决升斗不足縻春風鼓河水立岸看解維四郊鼙鼓聲問君此何時送程思永恭惟文簡公雅意在人物一時推鑒裁似秉袁許術莘莘材館盛多自東床出昌黎宰相器氣宇吞溟渤門闌最前席褒借難具述愛賢前輩事此道今誰恤我生獨何後歎不及湔祓聲馳翰墨場興盡雲霞窟古來豪傑士可殺不可屈塗窮暫時爾被褐未宜忽之子乃名裔秀爽開風骨尚勉激頽波典刑庶不沒送范彥覃春風惱百物物物不禁渠水為盎盎緑栁亦毶毶舒芳菲遽如許流光亦須臾誰令更别離此恨當何如外門有人物照映氷玉壺茹古髯似㦸說兵膽過軀中外已踐更能事乃緒餘主饋孟光賢郎君千里駒人生得此樂底事猶區區兹行謁賢相袖有時政書世家治劇手陶冶寧舍諸我老不適用飢寒出無驢論親無黨近分義何敢疏吾兒似我拙久已分龍猪一聞詞賦功决科良起豫山林與鐘鼎願言今則殊嵗寒茍在兹勿忘雙鯉魚芙蓉佳哉木芙蓉秋晚芳意足偶植華堂下似續淵明菊眷此好顔色可玩不可觸始見開二三旋已放五六濯濯晨風吹鮮鮮宵露浴非關競時節庶用慰幽獨我老百念空掃迹坐林谷猶作煙霞想久絶脂粉欲三徑阻幽事吟苦顛毛秃河洛未休兵愧負杯中緑
