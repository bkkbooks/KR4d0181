body:
  text: 嵩庵集卷五宋李處權撰七言律詩偉觀堂孤煙落日對銜杯此觀人間亦偉哉樹色逺從江浦合潮聲低咽海門廽衣冠喜有承平氣賓客慚無賦詠才城闕鬱葱人望幸五雲將擁翠華來送楊充老蚤接君家伯仲賢笑談吹斷各風烟人生俱是夢中事歸計却須沙上田悔有論心三尺喙恨無糊口一囊錢他時局罷樵柯爛小道誰知亦有仙送李全甫已斫長篇餞女生君猶從我覔詩行窮途白眼何須怪亂世蒼顔不足驚南國旌旗猶滅沒中原豺虎正縱橫蘇湖亦産人頭豆為問扁舟底逺征送景荀丈人能事見斯文世業家風盡屬君自許旦評方藉藉豈同時輩漫紛紛清於須水真堪挹秀自郎峯故不羣五馬雙旌何足道便看平步到青雲送石與德孺坡老仇池安在哉佛家鷲嶺解飛來但令氣象侔衡霍可要孤髙切斗魁渦處正堪承雨露浪中莫使長莓苔明窗淨几無塵入想對詩翁墨沼開送表之平生佳處在離騷怪我年來得此豪不信胸中橫太華試從筆下看驚濤門連止水心無競地接名山眼更髙要是一時廊廟器莫將劉向比王褒送徐漕都門雪罷看楊栁濯濯風流已不羣千里澄清方有道十年出處不忘君新詩舊自開錦段醉面向人生纈紋我欲從公借餘地與傳名姓上青雲送谹父一見瓊林病眼開東南秀爽力能廽須知載腹五千卷受我澆腸三百杯可但世官從鳯沼要看人物上雲臺歌呼枉費談天口宜及中興國論陪簡巽老雨後緑隂無處著風前黃鳥為誰歌天為世亂相逢少子以詩嗚不遇多行在故人能健否瘴江逐客奈愁何典衣尚可供湯餅蚤作清凉肯重過簡彥庸兄弟五年蹤跡似浮萍豈料全家入畫屏春去水田方漫漫曉來山霧却𡨕𡨕可憐北客鬢毛白尚喜主人眸子青凖擬豐年多釀酒正宜長醉不宜醒簡辨老松杉髙下韻笙簫谷口鐘聲梵海潮秋氣作隂連蟋蟀夜寒隨雨上芭蕉身危甚幸依賢庇吏隱何須覔句招直待它年見鳬舄始傳仙葉有王喬簡立之稅駕居鄰古寺中髙堂永日笑言同山雲濃淡未成雨溪竹飄蕭先得風短髮只從今嵗白衰顔無復少時紅君家釀熟能分我一醉端令萬事空簡劉致中兄弟祖筆摩空有賦聲長揚羽獵舊齊名頗推門第多人物故作樓居逺世情我輩一生悲短褐君家五字倚長城武陵欲借漁舟便春水桃花不計程簡潮公茗碗紋楸晝不譁心如出水妙蓮華喜君活計唯三事遇我人情似一家夜久竹聲聞雨過曉來山色看雲遮此身去國已千里回首中原猶暮笳簡致中溫其世情何怪白頭新豈料窮途復友仁一室他鄉春笑客半年行路雨欺人輞川詩說王摩詰谷口名聞鄭子真想是書機似圖畫雲峯矗矗水粼粼簡蘇二文丈人清德冠儒林三世文章照古今節比松筠元自直氣含海嶽故能深篋中尚有為郎被堂上寧無化俗琴賤子飄零無死所可憐羇旅費黃金池上書所見留别益謙池上風烟故可人倦遊老眼厭紛紛晴雲出岫似知我野鶴鳴臯疑是君可恨音書長契濶尚從杯酒見殷勤新詩凖擬頻相寄獨學方當病寡聞過德孺池上二首樹色溪光五月寒幅巾藜杖接清歡吞聲鳥自屏中過倒影山從鏡裏看佳處唯堪著胸次平生久已付毫端向來未築沙堤路豈信東山有謝安誰堪秋熱與春寒北客南州有底歡酒熟但招吾輩飲詩成莫與俗人看眼明白鳥清溪上心折黃鸝碧樹端口誦離騷手遮日夢魂不敢到長安次韻德孺感懷敝屣浮雲世所難誰堪走俗抗塵顔海鵬已激三千里天馬終歸十二間醉發杖藜雲逐逐香凝宴寢雨斑斑林泉久假皆吾有何必捐金更買山梅二首嵗晚匆匆日復夜老禪相對口慵開夢歸千里幾時到香度一枝何處來世亂飄零少供給地寒潦倒無梯媒可憐七尺髯如㦸愧負妻孥空撥灰可憐映竹深深見似為催詩特特開湖上林逋今老矣揚州何遜未歸來前村欲雨鳩呼婦斷壠收晴雉應媒幻境應當如是觀道人深悟劫池灰溫其示梅詩用韻為謝兼簡士特可喜劉郎鬢未霜能容宋玉近東墻自知老眼無春事誰意窮途得夜光前日桃園真有路何時蘭室可無香便須一醉經千日免作人間寸寸腸潦倒誰憐五十霜登門可愧及肩牆銀鈎已作驚人勢玉唾何慳照眼光春醉燈前猶縱博夜闌帳底更添香阮生正作窮途哭漫道江南刺史腸席上賦梅桃李何須續後開芝蘭勝韻許相陪先春莫道無深意調鼎方知有大才南國正宜溪上路故園長夢竹間臺騷人不為尋詩句自愛幽芳特特來和如祖弟二首老來風味淡於秋愧負平生馬少遊但得山雲供晚眺何須花雨作春愁新詩未省曾多見情話端知肯獨留政渴一杯澆磊磈書生何用玉為舟緑樹黃鸝隂復晴春風何處不堪行野煙著草綿綿色江日浮花灔灔明故國音書添夢想異鄉節物減心情逢人盡說兵戈事始覺如今去就輕叔易席上何處春光最可憐仙山亭上碧巖前窮來更覺詩堪畫老去誰知酒可仙雲色弄晴花蘸水風光縱好柳拖煙左思近有三都賦誰與吹噓送上天和賞卿席上之韻翠竹丹楓共一村詩家得句轉清新已憐楚地梅知臘更想隋河柳欲春須信成名皆志士故應行樂屬吾人請君淬礪斑斑刃始驗儒冠不誤身席上次表臣韻以遺明之仍督其和章一日復傾三百杯新年物色興悠哉應憐逺客此流落故有幽人常往來楮刻三年殊未就詩成七步可須催平生信筆多狂簡從此方知所以裁復次韻呈諸友梅樹飄香酒滿杯時危風景亦佳哉橫笻有客挑錢去重擔誰家送米來雲色可憐談次改年華不奈鬢邊催蕭郎及我親書尺珍贈霜紈費剪裁題畫卷平生丘壑幾欲顛誰使老來逢鄭䖍蒼須對我三千尺黑頭聼渠十八年已有霜雪入晏座寧無風雷浮屋椽箇中得句不敢吐可人何許心悠然次韻呈德基兼呈王侍郎書生卧病久無衣不意臨衰厭鼓鼙鄉信略無鴻鴈到客愁惟有杜鵑啼誰憐彈鋏長依孟自不工竽漫說齊我亦漂流費耘業看君文字照浯溪臨川道中寄汪守漸逺閩中地更平土風疏爽語言輕山濃不减嵩髙翠溪漲渾如洛浦聲忽見槐花思舉子欲求螢火遺書生使君元是丈人行回首鈴齊空復情奉懷養源士特似表一坐關山百念灰德鄰詩社許徘徊靜看林鳥銜花去寒覺溪風送雨來小阮有懷應種竹步兵無事且傳杯東牀坦腹真佳壻俗客多慙數月陪懷清叙夢想平生始此廽扁舟坐穩興悠哉隂隂樹底鶯聲切漠漠田中雨氣來亂世等閒凋鬢髮故園何處問池臺臨風不見髙公子正渴論文共一杯初至毗陵簡巽老時有所懷也從來語默有千鈞亂後相逢氣益振好鳥開窗如應客清風挽竹故留人更貧豈顧墦間祭已老猶堪席上珍說到蒼梧淚橫臆皇天萬一照酸辛觀潮二首雪屋銀山滿上頭年年偉觀近中秋只言滄海無廽浪豈信長江有逆流一一檣帆如過鳥時時烟雨要沉牛青衫白鬢功名晚何日翩然范蠡舟海舶忽驚風打頭觀瀾又破一年秋若為盡作杯中物安得飛來枕下流豈計雙鳬兼乘鴈誰分去馬與來牛君王大業追神禹前日黃龍已負舟送公卷赴金陵惟曾家世頗堪論文采南豐實浚源德必有言人望重義形於色主威尊隨珠未可輕彈雀腐鼠從教競嚇鵷固是相門終出相魯公泉下有英魂赴端禮之招道中偶成月離于畢俾滂沱兆及豐年喜欲歌任有泥塗甘曵尾更無波浪敢憑河老來酒量難酬酢閒裏詩情好琢磨晏子方觀久而敬人間炙手又張羅道中口占呈翁養源山行密雨來紛紛過午人家猶掩門水寒鷗鳥亦亡賴煙濕梅花如欲言頓忘客子懷抱惡可喜丈人顔色溫而今何計百年事乞與清詩當緑樽呈九兄我兄少有謫仙才襟抱於今得好開珠玉盡從談次落溪山渾入句中來弦歌小邑徒勞爾松菊故園安在哉有客漂流無稅駕願將髙義挽春回送二十兄還鎮江此行檢校幽棲事佳處知公故未忘新筍定應過母大舊松想亦及人長老來對客須靈照貧後持家藉孟光世亂身危何處是二年孤負北窗凉僕入月山介卿有詩見懷次韻答之鼠輩欺人可奈何我今行槖已無多醉魂尚愛黃華谷歸夢長迷白石坡壯士陸沉無籍在道人香積有經過行朝近報仍安穩想見沙堤蹀玉珂放步登逰回謝表臣遺酒每愛前山似畫圖興來蕭散豈能無幽人著屐全忘懶野老關門不可呼夕照暉暉明逺水春風莽莽著平蕪晴來已喜兒能賦軟腳仍煩送一壺次韻民瞻端禮二首枉報新詩錦不如句中風竹韻蕭疏頗分涇渭甘從子不較窮通豈病豫避地擬求千日酒誤身何用五車書誰人與作任公釣要使東人厭若魚春雨既過雲未歸春寒屋下人無衣林如膏沐鵓鳩語草已怒生胡蝶飛中原格鬬幾時定北叟飄零何所歸我今始悟蘧伯玉明明四十九年非次韻明孺見遺之什世家傳子又傳孫豈較前身與後身知足已如倉庾氏忘懷真是葛天民騎鯨又見詩無敵射虎何須武絶倫白屋朱門果非是萬錢日食是何人次韻端禮見寄自昔孤芳難寄林亂離漂泊却須禁春風不解廽雙鬢夜雨何堪攪寸心薄日花光懷杜曲清流竹色夢山隂從來玉石崑山火臭味多君肯嗣音次韻朴姪見寄鼙鼓聲中老戰塵故山歸夢月三更交情咄咄渾無寐學古悠悠浪得名鼇禁未容追世職熊轓何足語官榮阿咸自是吾家秀始覺前人畏後生簡郭令煌煌世譜未應微直道髙懷古所稀義往誰能單騎見幽尋坐想墊巾歸公庭此日棠堪憩仙路他年舄解飛顧我登門勤倒屣題詩愧匪謝𤣥暉逰羅漢院因㑹張良輔大夫遂留於壁寺古天寒杖屨清閒身合得此閒行破煙獨鳥驚人去積雪羣峯照眼明坐久泉聲醒客耳談餘茗味發詩情張公語壯髯如㦸蚤晚掀濤看斬鯨謝養源惠茶兼陪士特清啜仰止先生道不窮愛茶直似玉川翁靈芽動是連城價妙手才爭一水功賤子詩書元未飽愁腸藜莧豈宜䝉髙齊罷酒陪清啜歸御泠然兩腋風和九兄賀二十六兄除大諌祖德當年吐握勤諫垣人物典刑存在隂鳴鶴和有子産嶧孤桐枝見孫王室艱難欣得士世家矜伐敢援恩清明謇諤平生事况乃中興闢四門亨仲家兄擢居諫省詩以賀之除書喜動薦紳顔穩上天池刷羽翰詩似少陵多教化文從太史有波瀾王庭看折朱雲檻儒巷聞彈貢禹冠兄弟相知夫豈敢㑹憐流落久江干和表臣遺詩招歸仙隱客裏栖栖嘆食艱桃源也復念人間九重鵷鷺思金屋萬里烟塵痛玉關節物可憐梅競出浪萍長羡鳥知還明朝跋馬歸仙隱健筆清樽儘傲閒桐廬道中九日逢子公三年客裏重陽節故典征衣共一杯鴈下紫茰能自好霜前黃菊為誰開中原豺虎定何許故國池臺安在哉山水中逢張學士慢扶雙槳不須催景荀築室偉甚詩以贊之將老從君得所圖交情及我嵗寒餘適聞蔣詡開三徑且喜揚雄就一區盡取風煙多種竹雅為窗室便看書無錢可買墻西地决眥雲峯正起豫中秋對月露洗風吹未遽央登山臨水總心降明年此夕知何處自古中秋不可雙尚倚人琴溫似玉更能詩酒浩如江披襟拄頰渾無寐斗轉參移莫下窗次韻四首寄德基兼呈侍郎公溪流暴雨漲江同咫尺西鄰信不通衰朽怕看青鏡裏笑談猶近翠屛中侍郎客到無苛禮教授詩來有古風五載皇皇無稅駕我途正似阮生窮䝉塵天子尚戎衣南國旌旗正伐鼙國士傷時多刺怨王官失路有悲啼似聞叔向方圖晉亦報夷吾未去齊易地皆然心寸折釣竿吾欲老磻溪書文車軌幾時同諸道惟聞羽檄通豈較北南聊暫寓若論賢聖且時中門前楊栁方埀雨溪上桃花尚舞風誰見東山謝安石命賔擕妓興何窮紫鳳天吳在短衣亂來無日不鳴鼙情隨野鶴雲間舞夢繞城烏月下啼但得交情如水淡何須婦饌與眉齊抱琴載酒眀朝去相送無勞過虎溪
