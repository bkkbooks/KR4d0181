body:
  text: 嵩庵集卷三宋李處權撰七言古詩望靈石杖藜出望江郎峯清輝秀氣在眼中當年何人運神斧劖削碧玉成芙蓉平地崛起五千仞浮雲落日當秋空東西南北千里間他山莫敢來爭雄英靈往往在人物異時傑出聞數公偉哉髙厚職覆載儲精育粹良未窮畸豫家世本伊洛四時行樂都忘慵樓臺面面得形勝錦屏女几鳴臯嵩十年戎馬斷歸路流落江湖今一翁平生所得在黃卷昔賢今聖獨見容青衫憔悴百寮底猶欣收此筆硯功聲名突兀不磨滅要與此峯相始終歲晚諸君送酒賦長歌以謝之我有經綸天下之大志陶冶萬物之雄心上書幾欲自薦逹君門無籍不可尋歸來撫劒星斗近老去援琴山水深混迹漁樵友麋鹿興發時為梁父吟霧雨方寒蔽林藪黃狐跳梁蒼兕吼歲云暮矣人白頭納履踵决衣見肘茫茫大塊寧終久青史功名誰不朽昔賢逹觀有至言破除萬事無過酒朝來叩關聞剝啄長鬚致簡喜且愕滿壺傾寫清若空一釂衰顔返丹渥此物難從俗士論古今與世收竒勳寒谷可以回陽春澆風亦使還其淳書生分量當飲溫聖清賢濁何用分濁醪有妙理引人著勝地乘墜且不知焉知物為貴揚雄嗜飲而家貧𤣥嘲尚白費解紛屈原獨醒良自苦湘纍空有些招魂一石亦醉淳于髠五斗解酲劉伯倫卧輿當道陶淵明騎馬似船賀季真吏部有時甘盜甕丞相他年容吐茵古人已往不復見忽然舉觴如對面窮通得喪寓於此旦暮方齊死生變拍浮池中固不惡麴壘糟丘仍不薄一杯一杯復一杯身世兼忘乃真樂不可一日無此君今吾於酒而亦云安得四海盡種秫春臺壽域長醺醺士貴要豫賦水輪因廣之幸率介卿同作兼呈郭宰吳儂踏車繭盈足用力多而見功少江南水輪不假人智者創物真大巧一輪十筒挹且注循環下上無時了四山開闢中沃壤萬頃秧齊緑雲繞緑雲看即變黃雲一歲豐穰百家飽今年小荒人菜色斗易衾稠逮昏曉古來善政抑兼并貧富相通俗淳好閉糴待價良忍哉客主遑遑不相保令尹賢於鄭子産視民恐傷心皎皎朝來戒諭甚丁寧令下翕然風偃草我今亦有在陳厄回首田園迹如掃他年歸計一㕓氓抱甕甘同漢陰老次士特韻寄德久牧之家山鑿龍似修眉中有伊川寒更緑吾廬亦復逺城市舍下清流環幾曲四時幽人共吟醉飲若長鯨杯要覆三年芳草怨王孫定有金錢無處卜南征際㑹竹林阮兵厨况有酒百斛夫君筆力抵萬鈞所當穿徹如強鏃義形抗論及朝政正容凛若氷霜肅因君逺憶鄒與張疇昔之言皆可復二士揭揭廟堂器用之艱難一䕫足空令兩行壯夫淚回首盡向燕雲哭我心之憂正謂是夜中興嘆仰看屋相思歲盡書不來念我衣單體生粟再次士特韻愛君直似朱絲繩遇物可折不可曲三仕無喜已無愠肯學時人走巫卜平生不作吠堯事乘矢猶聞去其鏃至今莫可奸以私尊視正冠何太肅歸來田園不改舊歲寒見此猗猗緑絶交未怪孔方兄有酒盈樽書滿屋小人傾蓋已䝉潤遺我珠璣不論斛使我竟夕搜枯腸魚目非珍何敢復我今已似雲無心江湖不說虛舟覆言乘下澤與款段蚤莫少游良易足慣看赤腳老婢悲亦任索飯癡兒哭皇天其忍殺善類支離亦受三鍾粟聽彈廣陵時風正薰彈廣陵亂世掩抑咿嚘聲孰謂嵇康敢不臣此心炯炯難自明荒楸古墓鬼神嘯大澤深山龍鳯驚我來聽此可無語天乎孰謂得其平普月新寮百年均夢幻俯仰在一室况乃物外人身間有餘力朝來忽改作軒牖開虛寂匡床竹火爐棐几貝葉帙清風常入座飛塵不霑席煮茗焚香淨掃除賸種松杉障西日陪曽宏父登冷泉亭望飛來峯何年此峯獨飛來羣山讓秀中崔嵬神刓天畫不可狀仰視孤髙摩斗魁藴靈産此萬珍木隆霜幾度森不摧異僧一見乃能識擊洞果有猿聲哀靈隱之南天竺北築亭結屋初誰媒直疑朱夏落氷雪亦恐白晝藏風雷檻泉清可數毛髮白石齒齒如瓊瑰參差透影微日下淅瀝生籟長颸回恍然若欲學蟬脫洗眼緑净無纎埃已將纓塵付流水更以屐齒留蒼苔南豐家世有人物幅巾藜杖同裴徊劇談抵掌共相對惜無玉酒傾金罍先仲微仲純仲三兄過普明寺賞雪分韻得飲字涉春徂冬禱雨雪皇天靳此云何甚兒童曉報六花飛失喜鈎窗猶屢審荒渠斷􅘇氷已合度鴈停號口應噤望中玉樹散枝柯二室峯巒張素錦我家西鄰有勝概杖履清擕冒凝凛平生不作兒女歡此地適諧文字飲濁醪氷蔬薦重味燃鼎當爐肆烹飪詩豪遽發要分吟賴此放過新弛禁歸來老匠已先成定笑才慳弗勝任惜哉初無田二頃徒偕雀鼠賀登稔堂堂大尹燮理才嘉瑞應祈當奠枕書生醉飽何為者鼻息如雷但酣寢明朝更約提石瓶來試壑源最髙品短歌送范彥行并引昔司馬子微謂李白有仙風道骨可與神遊八極之表白賦鵬以自廣實寓言也壯哉麗矣而卒不及導引服食長生久視謂白不仙可乎外弟范彥行風骨之異映世照人立乎其旁覺我形穢仙事亡疑矣豫流年駸駸忽過知命蒼髯華髮把鏡自弔奔走塵土為兒女憐殆不免于翦翦之流弟方為江外之行豫亦有吳中之役飄然南北眷不忍别賦短歌以激之九萬里則風斯在下可不勉哉它日相遇顔如渥丹氣塞天地使豫駭歎之不暇者必知得於此也且為停杯一笑之資云海上芳敷有瑶草採而食之顔不老海中翕赩有驪珠探而得之形不枯赤烏𤣥未同宿姹女嬰兒自相逐深存踵息通三關升降出入無時閒九轉七返成大還功髙行滿起人寰凌虛一舉三神山次韻德基效歐陽體作雪詩禁體物之字兼送表臣才臣友直勉諸郎力學之樂仍率同賦朝來凍坐如縮龜不聞打窗那得知江南地暖亦有此驚心逺自龍沙吹六一居士最能賦東坡先生追撚髭腐儒得句亦起舞硯寒沃筆浮輕澌征塵暗天鐵馬健衣冠南奔身世危兄弟相望音信絶梳頭紛紛滿面絲裋褐袖手如懷氷車馬不來奚所為前年毗陵雪盈尺蟹螯猶記左手持歸來浩歌仰看屋夜深凛凛粟滿肌室中老婦幾興嘆膝下奈此號寒兒今年造物頗垂顧稅駕仁里歡此時殺雞為黍朝夕事苦節諸郎方下幃起看松竹有特操坐對溪山無俗姿劉子唱髙和彌寡要當獨醒啜其醨已呼稚子來候門更戒黃童無掃墀十千不向樓頭貰一蓑正憶江上披五陵之客誇輕肥呼鷹逐獸廣莫馳五侯之第事豪侈珊瑚照耀金屈巵豈如髙舉縱清賞鈎簾一目萬景隨亦有末至居客右其言不讓故哂之枯腸服氣如壽龜窮冬却掃百不知開門忽見雪滿地縱橫浩蕩春正飛入隙時欣㸃萬卷仰簷不見霑吟髭松林冥冥起薄霧澗水活活生微澌清可洗心明洗目卑且不汚髙不危殘粧如見壽陽面不食可憐姑射肌書生長年營口腹頗似蜘蛛空吐絲身將老矣厄離亂我生之初尚無為百篇落落或能賦一杯炯炯須重持崆峒漫倚防身劒枉負平生作男兒回首農桑三萬里無復貞觀開元時恭惟天子尚勤儉早集書囊為殿帷一朝隨仗過沙漠落日風塵龍鳯姿此時燕山士如虎寒多况乃秫酒醨肉食豈堪茹毛苦應念靴鳴集赤墀塵沙錯落赭黃暗貂狐獨向寒風披關山寂寞草樹死指㸃射獵方奔馳心益不忘嘗膽事望雲遙祝萬壽巵向來竊取名器者扈聖曽無一夫隨忠臣義士憤切骨皇天后土儻鑒之浴罷泉湯瀹膚垢如失振衣坐覺神充實挹其寒冽事清盥三咽逾甘過飴蜜華清之池故有名玉蓮出水香霧生可憐妃子汗猶濕已聞伐鼓漁陽聲我思行吟澤畔者夢想滄浪歸濯纓次韻劉端禮兼簡王民瞻郭進道從來膏粱鄙世胄豈知牛後與雞口况乃末俗交道衰時態紛紛翻覆手劉君門多長者轍俗子驅車未容蹂斯文博約有王郎正如白二得元九子猷無事只種竹淵明有巾惟漉酒萬鍾五斗唾不顧冷笑纍纍印如斗我今已無田園歸身外寧論婚嫁有卞和三獻已兩刖被褐㑹當逢一剖今君家世自汾陽漢相人物何堂堂坐使斯民歌樂康豈弟之化如龔黃趣君移具過吟窗羽蟲得時已飛揚謝徐獻可送款識刻九江使君何殷勤千里遺我款識文夏匜商鐘迄周鼎良工模刻錙銖分先秦述作知淵源相斯不紹嗟無傳歷載數千如昨日人與寶器名俱鐫使君雅尚心絶俗考古稽疑如不足搜羅遐邇極聞見附益之功思更續曽奉宣和乙夜觀萬丈光芒牛斗寒兵戈散落人間世神護往往投衣冠時去事非空歎息玊軸牙籖蛛網織載行何啻數橐駝變故紛紛豈人力煙塵翳沒咸陽道尺璧寸珠沉野草秋風吹夢入長安白髮蒼顔日枯槁夢江彥文春寒蘋末風尤徑過雨山林都眼淨西江天來瀉明鏡劈箭孤帆飛小艇中有丈人若氷壺氷為眸子玊作膚黃河逆流滄海枯倣佛羡門丹丘徒仙風道骨何敷腴煙霞之姿逺見揖弭棹芳洲招我急野人竭蹶摳衣入酌之瑶丹飫瓊汁薦以金桃露猶濕禦寇衣袂方泠然岸巾笑拍洪崖肩交梨火棗開心田木鑽石盤今已穿青鞋布襪白行纒游戲人間五百年送李巨源我世君家居里同異時德鄰飽過從論文髙摘屈宋艷結交逺躡管鮑蹤嗟我不識丈人行喜君雅有前輩風靖康三月虎狼去長安城中一再逢笑談未了已吹斷五年千里一轉蓬只知兵戈事奔竄豈料樽酒陪從容清溪照人山入座鶯聲已老春事空人生一世太草草客舍百事尤匆匆和文已逺典型在芝蘭玊樹庭砌中况君屢持使者節至今能聲滿河東丞相方須幕中畫國士之顧必所䝉開元貞觀望公等天子不在咸陽宮贈葉生帶如當風衣出水曹吳丹青古莫比一時更有劉與楊妙手斫泥端及此葉生心匠何瓌竒異代同聲人所推頗甘蔬飯絶肉想神物自應來護持花鬘珠冠寶月相補陀寶山移海上淨瓶楊柳翠鸚鵡突兀驚人煥尋丈十六尊者初不同儼然肖貌清而雄或伏猛虎制毒龍或飛錫杖凌虛空偉哉功刮造化窟凛發天風肅毛骨來觀堵立萬口傳坐看聲名從此出賀雨太歲治水十二龍春夏用事秋罔功半年不雨人作惡禾苖枯槁井泉涸使君勤政首勸農憂國如家願年豐齊居意禱天已通四山升雲野返風雨腳如麻未斷絶簷溜連宵聲不歇競報兼并發倉廩千里歡呼舞童耋上帝猶怒勑雨師羣龍鞭後不敢遲帝力於民民豈知始我公田畢及私槁苖復起井泉湧更聞擊鼓歌魚夢廟堂行拜富民侯歸作商家霖雨用次韻劉彥冲醉歌家山回首三千里世亂身危今老矣由來客子鬭身強敢弗加餐慎行李閩中此地稱多賢招我作鄰密且邇二子人物夙所慕傾蓋忘形到汝爾劉郎能事出世家勝韻那知集於此人生多計才狙公朝暮不離三四中我今一食日還併士也乃有如此窮愛酒猶能致山簡清談兼喜對王戎異時掉臂五侯門解紛堪作滑稽雄如今流落百無用夜起捋鬚問蒼穹白髮蕭蕭不勝理客舍燈花虛作喜憐君咳唾是珠璣照眼陸離光棐几惜不當年奪繡袍枉著詞鋒誇孟勞遣我黎明擁吟鼻寒蟬抱葉空哀號喜賊退父母之邦豈復讎人情至此乃可憂刺史縣令方坐視久矣肉食無逺謀崇墉可當天設險煙火驚奔無一㸃可憐縮手俱就斃不見一夫來襲掩清晨諸家好音至說賊回戈馬回轡玉帛子女既充牣捆載而歸乃真退妻孥向來便伸眉將軍凱旋亦班師身長八尺劍三尺緩帶輕裘有設施翁士特借韻見及復答之許國以身身反辱十日呼天鬢凋緑蠻貊直倚忠信行我心不疑顧何卜生喜柴愚惡鮀佞封侯豈謂能鈎曲可憐論交道大喪雲雨紛紛手翻覆望郎胸中橫萬卷日破千篇酹一斛雅好上取唐虞器多聞逺識肅慎鏃桃李不言自成蹊家法整如官府肅四海人髙懸犢鼻定知不作窮途哭郎君天池渥窪種墮地驚人千里足夜光聯璧乃暗投刮膜金篦快三復草𤣥正憶揚雄宅我今皇皇未有屋餘波豈止九里潤周也意在監河粟次韵端禮謝郭宰載酒相訪之什賢哉令尹出名胄百里歌謡不容口豈弟父母今信之視民恐傷如足手訟庭端可置雀羅若網在綱無雜糅萬頃之陂黃叔度雲夢何止吞八九潘嶽無事只種花陶潛有巾惟漉酒三公九卿唾不取金印從渠大如斗劉君語默端可人固知十室忠信有五經腹笥貫今古决疑索隱如瓜剖小圃風煙似洛陽翠微不减緑野堂㑹聞激烈歌時康不負抵掌工雌黃何時贈扇乃有語向來仁風已奉揚送庾姪親迎延平李先生家庾郎吾家千里駒朝暮勤苦讀父書少年綽有老成態月旦考訂評鄉閭明當别我擇賢妃去聲結束琴劒誰挽裾春空吹晴惠風暢煙草弄色和氣舒野橋融泄栁絮合石岸慘愴鳴鶢鶋乘龍有期弗獲餞數椽政葺淵明廬旅愁冥思莫排遣離恨掛臆難掃除况當春晚氣暄淑著體欲醉甘醴如修程所囑蓋養攝禮畢早辦雙飛輿婦翁傳道世大儒習俗再使淳古初稔知賢舅繼家學子如從之師有餘歸來阿叔待審訂義路禮門從廣居雙溪堂晚集北風呼雲生夕陰小松稚竹俱蕭森雙溪主人不孤斟好文尚類肯見尋坐中少監樂登臨清談亹亹知古今有句不吐藏之深而令下士寒螿吟遊石橋御風縹眇雲霞衣驂龍翳鳯相追隨三秀為糧桂為醑玉笛送酒雙童吹樵歌已換人間世未了巖前一局棋桃源歸路咫尺迷醉眼疑在扶桑西仙人授我長生訣俄而夢覺鳴天雞張元覽追和東坡詠梅要豫同賦江空月掛踈梅村生香湔祓何郎魂亭亭自是塵表物玉質敢有煙埃昏西州風土似南國髙樹繚臺丞相園居然志士節獨苦炯若德人顔更溫至今往往入幽夢夢去折花迎朝暾冦來一炬半月紅傷心無處求朱門君知行樂不可緩中聖友賢餘勿言侍郎堂西臘前破喚取我輩㪺窪樽文度以大笏見遺竒偉特甚非鄙人所稱擬柏梁體草句以謝然他日出處斷不負此笏老狂不衰聊供一笑云南越巨象何壯哉齒牙脫落歲幾枚削木混真易以埋玩視常恐生怒猜良工到手能剪裁成此大笏莫與偕逺隨舶賈凌濤雷論賈奚啻百瓊瑰異貺忽自王孫來珍藏十襲敢遽開瑩如截玉無纎埃照人氷彩滿袖懷惟君許我王佐才我亦自負剛不摧他年致主登中台垂紳峩辨直斗魁正色凛凛天可回帝傍奸佞須擊排恢復洪業平泰階寫之丹青上雲臺懷陸仲仁陸郎好古心不俗雅似王郎愛修竹緑陰清晝坐焚香想見人琴兩如玉尺書招我我未暇興發從君醉醽醁秋風滿院木樨繁明月飛來花底宿觀漁老漁取魚倍知津設網提綱疑有神船頭兀坐如鴟蹲忽然一舉千百鱗涎沫盈筥趨早市掌握銅腥俱是利陂湖漠漠水連天盡欲留為子孫計書生白首困嚅囁世亂身危舟一葉君不見孟嘗門下客三千此日馮歡正彈鋏闖山亭亭臯樹林五月寒坐損秀爽披孱顔使君清雅頗好事妙墨風流名闖山雲歸雨罷作佳色山在杳靄空濛間煙中合還展屏障鳥外紆餘堆髻鬟踈簾捲盡一搔首决眥蕩胸如可攀江頭好山不知數供給騷人猶等閒簡柴端叟筆端落落曳十牛老氣飄飄橫九州河伯未睹北海若魯人未識東家丘豪户但餘酒肉臭要塗秖益衣冠羞旦評公議百年後此士斯文班馬儔
