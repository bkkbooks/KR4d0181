body:
  text: 嵩菴集卷二宋李處權撰五言古詩元夕陪張使君燕集老大於節物真成風馬牛出山赴嘉招敝袍厠英遊簫鼓市井隘綺羅人物稠嫦娥亦飛來餘光上簾鈎使君民父母謡頌布政優牙旗錯綵繡康衢看遨頭夜氣燭光滿春寒香霧浮中興太平象郡國皆魯鄒豐年入醉鄉頒白卧道周遙知蒼龍闕宴敞華萼樓惟公班馬手斯文擅風流行歸侍嚴宸玉堂聽更籌獨憐衰病客鬢毛蚤驚秋頽然賔裾後報德慙應劉簡申甫求畫平生金石友參商幾暌阻二年更喪亂流落隨處所夫君丘壑姿鴻鵠杳鶱舉超然有能事妙絶見心苦蒼茫尺餘松黛色起煙雨興來灑風竹六月無袢暑又嘗作平逺近代未可數奈何於吾儕一筆獨不與我有敲氷練度越世俗楮煩君作橫卷放意寫湘楚次韻翁子秀移竹嘗讀東坡詩不可居無竹況此真琅玕一一溫如玉得非瑶池種阿母所愛育一日三封植近之誰敢觸山僧不知貴遣送如薪束坐成阮家林色映兵厨醁主人何必問抱琴來就宿此君不須多瀟灑數竿足却笑陶元亮但採東籬菊哭駕部舅并引吾母棄諸孤一年季舅駕部公奄即泉路天喪明哲殆及斯文吾舅德容德言濟以問學郎官使節未為達官人望之已如泰山北斗矣廢居幾二十年以沒其身平生抱負不盡用於世然士之賢有識者咸能道其平生又何憾焉某銜哀力貧走五千里覬一見吾舅以訴孤苦將至其前遽聞訃音如中鋒刃不知涕泗之橫流也世亂身危茍生何益因追想作詩哭之云外門推望郎天啓眉幹白揭揭廊廟器仕道無枉尺仁義允蹈之言行可法則優為君子儒彬彬見文質伊川有夫子四海尊學術燕申鄉里化語默世不識公時列髙弟見獨蚤入室從容為邦問領略濟時䇿海涵而地負光輝日充實向來坐省中能事已籍籍出入羣公間持論頗正色皎皎活國心周召可輩伯朝廷公議喪牛李計方得道大固不容青蠅工點璧知難襆被去回首帝閽隔嗟嗟已衰俗弗俾蒙其澤出把使者節顧未逺親側榮耀老萊衣孝心惟惕惕溫尋故時學委蛇山水國澄清足暇裕薦延頗推擇宛彼南陽族食指居數百衣冠日零替貧有未葬骨慨然斥餘資黃壤即安宅于公已髙門叔敖有隂德敵馬禍中原南遷例奔迫故林無巢歸瓦礫漫阡陌艱難更道路扶病親藥石肩輿豈久堪命數奄兹厄銘旌瘴煙裏過者為悽惻無兒但有孫尚可付窀穸墳墓五千里河洛兵未息招魂動楚些路逺迷南北鯫生愧無似忘年樽俎客提擕在斯文恨不借羽翮去春失所恃巨痛摧肝膈銜哀赴喪所寸步且如棘猶期見渭陽慰我孤苦極傷心捨我去淚落滿裀席遙知凛生氣千古猶不沒夜中夢見之話言及疇昔謂公猶在世眼明失心疾山風忽驚起月朗清露滴食石鱗異時栁栁州謫居食蝦蟇人情尚隨俗此道誰疵瑕窮工見文字制作排淫哇作詩報昌黎想當劇雄誇集中此篇亡恨不窮天葩人生一飽止何事須魚蝦我鄉實西北柯山偶藏家土人重石鱗充饌蔑有加商論及品次衆口時紛拏朝來有分甘珍味到齒牙籠粒坐剝雪壺漿薦流霞此物亦易致我飢其有涯兒童還可笑逺岸去擕義感春春風欲裂石春雲如鼓濤況復橫來雨簷溜聲連宵畸人早盥幘散目臨亭臯挽折户外栁吹殘竹間桃慨然念芳物摧抑適所遭因之感時節幽憤空忉忉少年亦棄置自引瓶中醪醉後眼生纈孤坐清吟髙聞梅巖寺報梅開可是知時節映竹已蕭疏臨流復清絶正須幽士賞莫縱狂僧折山寒雲霧深日暮更飛雪雨後凝秀閣口占呈子方春雲向晚留夜雨凌曉濯花明嬌欲語栁緑淨可握化工了無盡芳意殊未覺燒筍薦清尊此味初不惡君知忘憂物便是却老藥百年終一炊無事且行樂陪張巨山謁清獻公祠惟昔清獻公二年蜀中歸歸載無長物一琴而一龜龜屬煙霞想琴寓山水思婆娑二物間德容儼怡怡元龍豈時輩康樂匪俗期書齋質不陋覆之以茒茨手植參天松亭亭嵗寒姿公去幾霜露髙風猶在茲可使貪夫亷至今仰伯夷使君挺孤潔後身蓋亡疑治體簡而肅民俗醇不疵竭虔拜公像雅有賔僚隨置酒延公孫誠意公所知表表孝弟里人物固未衰德厚者流光此言良不欺春隂淡物華藹藹原隰滋逺山出雲氣近水餘風漪時禽屋上語野蝶筵中飛此堂歷千載盛事傳一時凛如公在傍冠辨不敢欹庶幾飽公德滿酌其可辭聊以永今朝畫景方舒遲贈髙老野寺何所有梅花如玉盆客愁浩如許我聲已載吞大士坐丈室燠若陽谷溫從來第一義入耳簡不煩不謂兵火餘見此祇樹園仰沐方外契藹然風味存我詩如廢井已涸寧有源又如既老馬力盡不復奔空餘浩然氣踵見常焞焞熊經非我事詎以胎息論蒙莊豈達者區區説鵬鯤何如栁下惠坐令薄夫敦殊方對節物凄斷逰子魂山晚雲欲雪隂風樹雅翻不見柴桑翁此意無語言送禪客入髙峯茫茫人間世佛法最長久山林坐九年面壁不挂口須是丈夫兒懸崖能撒手為語學道人何須天下走夜寒雲去盡橫參挂南斗我已辦青鞋要聞獅子吼贈寶勝主僧木落山重重溪長雨霏霏雲慘傷客容風叨裂征衣我行已千里恨無羽翰飛倒帆近古寺煙鐘深翠微明軒快逺目俯仰涵清輝上人惠休輩道眼與世遺匡床竹火爐翛然自忘機餘生尚奔迫所遇非所依天地兵革滿鄉關音信稀拊膺坐長嘯嵗晚將安歸戲贈巽老學詩如學佛教外别有傳室中要自悟心地方廓然悟了更須坐壁下三十年他時一瓣香未可孤老禪江郎峯壯此江郎峰何年儼而峙融結自太古造化鍾一氣屹然居獨尊羣峰俱不至如冠劔大臣廷諍而出位大哉天地間覆載不敢議此峰有四面面面各異勢撑空方突兀傲世不嫵媚我昨玉山來雪罷煙收霽川平如湧出蕩漾浮蒼翠已逺更回頭眼老猶決眥眷言須水陽稅駕得巖寺黃童與白叟追逐兩閲嵗勝踐在咫尺心賞通寤寐塵勞不鞭後俯仰徒自愧會待秋風髙杖履窮幽邃雲深月滿山儻與神仙侍簡士特春來雨鳴屋夜靜雷破山客子嘆身世曷以舒心顔髙人不事事結屋蒼翠間松竹不改操鴻鵠何由攀想知於此時齋扉猶未關短檠書史倦危坐聽潺潺讀書西風吹雨來濯此青琅玕黃華媚幽獨秀色如可餐我居適在野門庭已荒寒老屋四壁立生涯堪鼻酸向來頗好飲無日無杯盤而今廢升斗百憂何以寬惟取架上書拭几支頥觀偉哉聖賢旨妙處言莫殫如渴遇新汲醒然開肺肝因不求甚解會心亦解顔茫茫百年中毁譽非一端要知仁與義多出貧賤間相逢勉為善世路良獨難誰能逐狂癡凌競趨險艱何以易此樂此樂居之安雪中赴德孺燕集北風夜號呼逗曉雲已罩臘雪及春來佳瑞故難料舞空復低徊投隙乍顛倒山川若為容松竹不改操斷隴失坡陀連峯增峻峭瓊堆與玉立南北淨相照獨鶴無處尋田中發清叫疏梅有時見水際含微笑晏裘昔所慕王氅可同調江練好催詩公乎今謝朓題吕季升谷隱堂兼寄居仁莘野隱於耕傅巖隱於築叔夜隱於鍛君平隱於卜四子隱不同抗志俱超俗夫君無所事掃迹隱於谷優遊以卒嵗燕居常慎獨方寸湛若水顔狀溫比玉白璧無瑕玷幽蘭自芬馥插架萬籖書擁簷千挺竹時乘昃月過自伴微雲宿蕭然伏臘餘尚不愧此屋豈曰不願仕可以速則速富貴草頭露榮華風中燭止止理固明知止乃不辱小人無藉在放浪謝羈束衰年迫飢凍強顔隱於祿晚食且徐行分量初易足婆娑一丘壑雅趣在松菊平生喜文字終恨窘邉幅顧聞多種秫迎寒釀已熟更約阮仲容清談夜更僕陪約之宿東禪倦逰得兹行頗愜丘壑性俗慮與秋澄禪心隨夜靜燈前見修竹月下聞清磬未作故山歸空吟長卿詠北禪老屋不知春餘花紛委雪中有忘言人截斷天下舌我久執情見終日在談説一笑示全機春雲滿城闕送岑壻歸許昌恨我生不早不拜蘇范岑倀倀斯文中永歎一何深世家潁川上萬卷修竹林相望羣玉府清風猶至今合好一大事遺訓敢弗欽求之且彌年齊大肯見臨侍郎著清德溫厚如球琳吐而為文章中有太古音嗣孫固多賢玉立俱及尋近坦東床腹執禮不免簪留連嵗將晏離索秋正隂往崇丘索志用壯爵祿心一杯須重持為子商聲吟當復記衰懦病懶何可針陪陳叔易汪彥章登浮翠亭羣峰如髙馬飛雲若為馭蒼翠來無際擺脫欲仙去我時登兹亭物色生四顧同行有君子粲笑隨杖屨樵蘇自生理孤煙橫匹素歸鳥楓樹林天髙西日暮不見髯將軍長橋斬蛟處安得起斯人扶危正天步平生江湖想齒髮凋行路倘有百斛舟載酒經煙霧環照閣口占呈德良髙情接巾屨雅志在丘壑林疏見鳥下池靜聞魚躍嵗月已屢改風煙只如昨我知造物心遺子良不薄畏途有豺虎駭浪有鮫鱷何如逺憂患共此吟嘯樂撫松堂為王晉玉題丈人居水南未省價髙索平生丘壑事長嘯天宇窄舍傍五株栁宛是陶家宅舍南數畝園似與人境隔方須漉酒巾漸喜扶老策以兹不願仕偶然似彭澤青松手所種撫之無愧色都忘嵗月徂不受霜霰迫是身等浮雲術也可不擇持此百年間常恐中道畫曠哉遺世情遇我眼不白問我來何時胡為久於客我官亦易拋行矣勿多責方從倦飛鳥望林整歸翮雙松堂為季舅題對植是何年巖巖挺寥廓風雷已屢起霜雪終不著先生立其中偃蹇相參錯髙標與秀氣鼎足冠伊洛想此堂成初來賀紛燕雀醉哦淵明句衆鳥欣有託偉哉拔俗姿聞見窮浩博鐘鼎列珍玩圗史諧至樂小人辱忘年髙義見嘯諾詎敢窺藩籬庶遂飫糟粕南池俯空曠倒影如衡霍乘月抱琴過坐石幽弄作面山堂青山不逺人人自與山逺好事或致之來赴不待挽夫君有丘壑於此興不淺昔為谷口鄭今是竹林阮雌黃不挂口青白常在眼官居真吏隱衙鼓自早晚常令逺趍走俗冗盡除剗朝夕面蒼翠無事日把盞填門氣象豪入户雲煙滿詩成足風味醉墨自舒卷我獲一日雅甚愛王戎簡儻無絶交書定過嵇中散十月十日陪張丈奉髙雅臣德器凌波亭小酌漂流劇東南所厯過所聞始及廬陵郡俯仰尤不塵朅來未敢忘事賢友其仁翹翹蕭與李拔萃而多文蕭君辭蓋寡空林蘭自薰揚鞭捨我去意欲樹殊勳李君舌尚在真氣凌秋旻掃門與我俱軟語回陽春客舍甲子雨八荒同一雲傾蓋有彭子微言時解紛愛我忘其陋肯顧羅雀門從容香積飯可口謝八珍張公丈人行氣宇老而淳舒吳無俗姿信是德有鄰籃輿復聨翩去指江之津坐中皆我輩肴䔩來逡巡把盞屬形勝領略難具陳山寒更宜逺江流復沄沄大哉開闢功孰測造化源挂席者誰子其來自無垠耽耽載萬斛徴取何其勤落帆占近岸過逢慶欣欣方矜猗頓富誰信管鮑貧鳴雁何處來冥冥初不言亦知箇中好鳴呼下其羣商羊不覺舞漁父收微緡煙樹僅可識歸鴉喧水村我昔觀畫圖對此猶心存恍若夢中事有懷擕酒樽客子鬭身強身外安足論無事頗相見斯言吾所敦月夜鼓琴清風泛寒露夜久氣轉涼恍然幽夢覺明月及我牀披衣起獨坐愛此數尺光興來御桐君正始其可忘山髙既峩峩水流亦湯湯方當志獲麟故冝鄙求凰永懷嵇叔夜復思蔡中郎妙處與心會樂哉殊未央次韻叔羽聽琴詩嶧桐斫孫枝所取非老大比其爨之焦孰謂雍也過拂拭見太古斷腹宛蛇卧持來長安市萬口莫能破愛公胸次廣雲夢吞幾個夜堂發孤彈風月清入座髙山不易賞白雪久無和且樂舜絃薰毋事楚臣些退老堂我公自言老能事如少年我公自言退人材望陶甄公功在本朝本朝方賴焉公德在斯民斯民寧舍旃中年倦政幾去若浮雲旋名山占形勝築堂蒼翠巔窪樽為壺觴虛籟為管絃招擕足賔客嘯傲窮雲煙胸中萬卷書三峽傾詞源興來不停綴摛華筆如椽登臨出妙語珠璣落清圓不數劉白輩一斗真百篇裴傅堂緑野贊皇墅平泉東山謝安妓五湖范蠡船四子之於公器業微差肩公之於四子趣尚并其全公術可活國公力可回天蒼生望公起天子忘公艱佇瞻丹鳳詔衮衣來陛前三入知眷殊一夔見任專發揮中興業開闢造化權拯焚而救溺持危而扶顛雍容復密勿造膝陳一言長驅卷沙漠搗穴空腥羶談笑九州復歡呼兩宫還四海各安堵六軍同晏眠躋民入仁夀致主登光宣圗像冠雲臺勒功照燕然功成了不居髙謝區中緣拂衣赤松遊辟榖求神仙去去蓬萊路雲螭不受鞭題周氏棣華堂管蔡既失道周公遂相殘召公乃賦詩棠棣良可觀聖賢尚如此末世詎得安斗粟與尺布至今興永歎汝南賢伯仲鄉評藹芝蘭氷清而玉潔友于甚相歡鴻雁識先後鶺鴒知急難同衣且共爨怡怡生理寬塤箎翕和樂學海窺波瀾好爵豈終靳未用詠考槃他年表門閭紫荆出簷端題瑞松亭德積固有源吉卜可無地要知青囊術詎盡黃壤計翁族鼎七閩籍甚月旦議五車聞善訓三遷見深意父子兄弟間接武廣寒桂世方慕朱紫此道非我貴而今二阮賢風雅果未墜婆娑竹林下頗用文章戲諸郎赤鳳麟唾手可髙位惟松嵗寒質似抱君子器偉此無情物胡然效斯瑞天人理則懸聲聞在交際我行幾千里嵗晚飄零至升亭整素冠敬仰動長喟塜木助芊芊前山益佳氣召伯祠我行出陜右來升召公堂歎公不可作祗令吾道傷優哉聽訟日斯民歌樂康善教被南國美蔭餘甘棠惟公與周公左右相成王孰知二公心千載惟蒼蒼人不學二南其蔽猶面牆先聖垂此言下士其可忘太史述世家源深者流長公澤亦至今風烈殊未央再拜仰公像冠佩猶煌煌裴􅏆不能去淚落征衣裳題九江徐使君眄柯亭庭植何夭矯蒼皮餘雨溜本非尋常材嵗月方成就偉此蕭散姿眄睞揖孤秀慕陶築斯亭千載可同臭引杖步嘉蔭擕書席永晝舒嘯一徜徉清風滿懷袖更想五老峰傑卓立癯瘦何因借羽翮接踵賔裾後次韻陳叔易三首草碧波復緑南浦愁送君君行將何之愴指南北雲相思無早晚生離無近逺悠悠關塞阻杳杳音信斷青燈挑已盡夜長方展轉東鄰有豔婦傾城室家索西鄰有貞妻空閨守葵藿良人萬里去豈為鉛華落君心諒不移妾命由來薄天地終無情人生復何託馬鳴旌斾搖雪滿關山道白草連雲中羊腸復縈繞别離工損神宿昔已枯稿却望南飛鴻驚弦亦虛憍祗應馬上曲偏能寫懷抱將遊西池偶書去年客中愁忽忽意未伸歸來媚兒曹行樂猶及辰融怡帝鄉日浩蕩天街春物色豈不好所思難重陳婉孌有能事朱絃妙通神從容蘭臭言事事皆可人關河一乖隔夢想清洛濵況乃行止間愧負匏瓜身情隨節物改事逐風景新躊躇不自釋淥酒徒芳辛明朝更牽強接踵肥馬塵凌波固可慕解佩良無因青翼不復來悵望瑶池津紀鶴青松百尺餘宛彼山之陲白鶴巢其髙皂鶴巢其卑紅鶴不敢來下巢楓樹枝陽春一動蕩百鳥俱蕃孽綢繆各盡力草草成藩籬卵翼與哺育不愧烏鳥慈清晨求食去鼓翼逺奮飛斯須復來還亦有蛇鱣隨引頸鳴相呼所憂非渴飢不日毛羽成頡頏下陂池浴之以清泠弄影相娛嬉既久遂不來逺舉將何之髙山與深林浩蕩信所歸明年又當至復作今所為我為唐虞世鳥巢何所窺亂來纒兵火殺氣滿四維人羣失安居恨無羽翰施偶此共偷生逼仄何可辭憂患亦所同去就可弗思網羅非爾事彈射不爾私近辭燕雀喧逺與鴻鵠期相望在寥廓大翮如雲垂時來松樹間聽我哦此詩玉簪花秋露日以繁秋氣日以清愛此堂下花色好香滿庭藉之青玉葉表以白玉英微風過披拂小雨來滋榮我老味更薄與世無復情頽然衰病餘見花猶眼明俗客不到門取琴花前橫小童為席地取酒花前傾昔人工比物言簪豈虛名願登君子首雅與冠辨并溪橋昔人愛仙掌歸時倒騎驢風味顧不淺豈以俗士拘我來過溪橋效顰返肩輿異世頗同懷往者不可呼是時秋冬交霜後木落疏人家在窈窕溪山如畫圗我老尚羈束愧爾鶩與鳬川光媚煙景沿戲得自如人生一世間過眼皆空虛偶然及勝踐臨覽復起豫尚當風月夕藉地倒一壺意亦不在酒得句聊自書誰能五侯門長鋏歸來乎聽照曠塵外琴老全氷玉姿不受一滓塵彈琴看飛鴻自是千載人幽蘭寫國香白雪回陽春邈視嵇阮流不肯加冠巾絲桐得心法二子入室親髙山與流水領略難具陳前年出關意浩蕩誰能馴跌足兵火圍所遇多苦辛却來湖上寺翳拂坐石門頗有名勝士宛然交道存寄書亦及我匪但通寒溫問我能來無愧負匏瓜身翩然如野鶴接羽凌秋旻過我晉陵郡促軫風露新諧和下鸞鳳幽怨出鬼神老全殆不沒千古名知津漂流更喪亂我生乃不辰見子顔色開慰我羈旅魂我心亦清苦久願丘壑鄰何時舟載月一弄秋江濵翁士特李似表相過小酌分題得躑躅我無錦繡腸而居錦繡谷春風二三月山花名躑躅芳鮮照寒澗窈窕映修竹化工亦耐事造物能委曲不知幾猩唇貸此色可足看久直欲燃況乃手未觸杖藜兩幅巾人物俱驚俗方觀筆端妙更對杯中醁念昔嵩少步千層上雲麓政似徐熙圗寫生開百幅懷歸阻兵火夢想如在目會當返升平柴車駕黃犢家君為張丈明叔段丈處厚作詩集序小子贊之二老學而窮超然以詩鳴雍容三百篇一一韶與韺挺特汜水詩強梁與古爭寂寥會隱篇淡蕩遺心營珠璣淪瓦礫有時應夜明過者劇千萬豈無一不盲我父實久要早以文會并茲來唱無和樽酒懷平生遺篇乃見屬悼往泯厥聲歘然奮長筆托實無過情而今且誰託兩族俱凋零從古作者意所務非近程徐觀百年內汚世曷足名寄題向伯恭薌林薌林近知名悵望江干路無因從之遊夢魂幾飛去侍郎天下士器識廊廟具詩似王右丞文如韓吏部勇退不待年蒼生思謝傅幽棲新卜築日涉已成趣人物在籃輿風流稱棕屨身間魚鳥近心逺煙霞聚淨几展圗書疏簾約風露時傾清濁酒喚客坐飛絮江鱗白可膾野雀黃堪茹歡言忘賔主脫帽方箕踞手揮玉麈尾故自有佳處拄頰欲招隱撚髯知得句快當走尺書徑拉王文度次韻張匡山使君郡齋對雨效韋蘇州體坐嘯凝香霧卷簾松竹青新霜戒微寒逺日朝霞赬過午時雲族其濛見初零蕭蕭打葉響瀝瀝依簷聲幽鳥故格磔寒蜂自竛竮棕君曲江裔句含萬古情端知意有在復契心所𡨕至哉蒙莊言為善無近名天韜久已解世網詎可攖寄謝夸毗子胡然事蠅營次韻元章黃岡春雪督二姪詩課夜雪駁羣峰春寒僵萬木山齋無所為髙卧仰看屋凍雲飛不去就我簷下宿平生柴夫子能事立於獨蚤直渭水鈎晚懷荆山玉陸地詎能沉世侯終必復不見林中蘭無人亦芬馥暮年一丘壑避地歌同谷散誕水石間清涼日三沐笑人強解事閉門作龜縮一世竟何成萬事蛇著足二姪瑞家庭貫穿經史櫝才如射虎將中石猶飲鏃詩成出連璧墨妙粲箋幅乃知作者心求益不求速我年及學易方究大小畜翛然對此君苦節更森束嗟今但洋洋悼往寧逐逐願借鄴侯書盡閲三萬軸無因訪煨燼歎惜邯鄲目雨望寒望暮雨來隱見田中路紛紛黃雀起冉冉行人度長林相蔽虧連岡莽回互莫作異鄉悲百年均暫寓
